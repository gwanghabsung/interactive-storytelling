<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>참여 · Audience Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #15151c; --surface-2: #1f1f28;
    --line: #2a2a36; --text: #f5f5f7; --muted: #6a6a7e;
    --accent: #ffd60a; --danger: #ff3d71; --success: #00d68f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Bricolage Grotesque', sans-serif;
    min-height: 100vh; overflow-x: hidden;
    user-select: none; -webkit-user-select: none;
  }
  .container {
    max-width: 520px; margin: 0 auto;
    padding: 24px 20px max(24px, env(safe-area-inset-bottom));
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 16px; border-bottom: 1px solid var(--line); margin-bottom: 24px;
  }
  .brand {
    font-weight: 800; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent);
  }
  .brand::before {
    content: '◉'; color: var(--success); margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .user-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  .user-tag b { color: var(--text); }
  .logout-btn {
    margin-left: 8px; padding: 3px 8px; background: transparent;
    border: 1px solid var(--line); color: var(--muted); border-radius: 4px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em; cursor: pointer; display: none; transition: all 0.15s;
  }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }
  .body { flex: 1; display: flex; flex-direction: column; }
  .join { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24px; }
  .join h1 { font-size: 40px; font-weight: 700; margin: 0; line-height: 1.1; letter-spacing: -0.02em; }
  .join p { color: var(--muted); margin: 0; font-size: 15px; line-height: 1.5; }
  .nick-input {
    background: var(--surface); border: 2px solid var(--line); color: var(--text);
    padding: 18px 20px; border-radius: 12px; font-size: 18px;
    font-family: inherit; width: 100%; transition: border-color 0.2s;
  }
  .nick-input:focus { outline: none; border-color: var(--accent); }
  .waiting {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center; gap: 24px; padding: 40px 0;
  }
  .waiting-dot {
    width: 80px; height: 80px;
    border: 3px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .waiting h2 { margin: 0; font-size: 22px; font-weight: 500; }
  .waiting p { margin: 0; color: var(--muted); font-size: 13px;
               font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }

  /* ─── logic_break — 6-3 머리방 게임 ─── */
  .lb-scene { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .lb-quest {
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.01em; line-height: 1.3;
    text-align: center;
  }
  .lb-round-pill {
    align-self: center;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    font-weight: 700; letter-spacing: 0.14em;
    padding: 5px 12px; border: 1px solid var(--accent);
    border-radius: 999px; color: var(--accent);
    background: rgba(255,214,10,0.06);
  }
  .lb-desc {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .lb-desc-title {
    font-size: 11px; letter-spacing: 0.16em; font-weight: 700;
    color: var(--accent); margin-bottom: 8px;
  }
  .lb-desc-items {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 6px;
    font-size: 14px; color: rgba(255,255,255,0.92); line-height: 1.45;
  }
  .lb-desc-items li::before { content: '─ '; color: var(--muted); }
  .lb-question {
    font-size: 18px; font-weight: 700; margin-top: 4px; text-align: center;
  }
  .lb-opts {
    display: flex; flex-direction: column; gap: 10px;
    flex: 1;
  }
  .lb-btn {
    display: flex; align-items: flex-start; gap: 12px;
    text-align: left;
    padding: 18px 18px; border-radius: 12px;
    background: var(--surface); border: 2px solid var(--line);
    color: var(--text); font-family: inherit; cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  .lb-btn:active:not(:disabled) {
    transform: scale(0.98); border-color: var(--accent);
    background: rgba(255,214,10,0.08);
  }
  .lb-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .lb-btn-letter {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    font-weight: 800; color: var(--accent); letter-spacing: 0.06em;
    flex-shrink: 0; padding-top: 2px;
  }
  .lb-btn-text {
    font-size: 16px; font-weight: 600; line-height: 1.35; flex: 1;
  }
  .lb-btn-mine {
    border-color: var(--accent);
    background: rgba(255,214,10,0.12);
    opacity: 1;
  }
  .lb-btn-winner {
    border-color: var(--success); background: rgba(0,214,143,0.12);
    box-shadow: 0 4px 14px rgba(0,214,143,0.2);
  }
  .lb-btn-failed {
    border-color: var(--danger); background: rgba(255,61,113,0.15);
    box-shadow: 0 4px 14px rgba(255,61,113,0.3);
    opacity: 1;
    animation: lbBtnShakeM 0.45s cubic-bezier(.36,.07,.19,.97) both;
  }
  .lb-btn-correct-hint {
    border-color: var(--success); background: rgba(0,214,143,0.08);
    opacity: 1;
  }
  .lb-btn-correct-hint::after {
    content: ' ← 진짜 정답';
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--success); font-weight: 700; margin-left: 6px;
  }
  @keyframes lbBtnShakeM {
    10%,90% { transform: translateX(-2px); }
    20%,80% { transform: translateX(4px); }
    30%,50%,70% { transform: translateX(-7px); }
    40%,60% { transform: translateX(7px); }
  }
  .lb-retry-note {
    text-align: center; padding: 12px;
    background: rgba(255,61,113,0.15); border: 1px solid var(--danger);
    border-radius: 10px;
    font-weight: 700; font-size: 14px; color: var(--danger);
    animation: lbBtnShakeM 0.5s;
  }
  .lb-submitted-note {
    text-align: center; padding: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--muted); letter-spacing: 0.04em;
  }
  .lb-banner-success {
    text-align: center; font-size: 28px; font-weight: 800;
    color: var(--success); line-height: 1.4;
    text-shadow: 0 0 30px rgba(0,214,143,0.4);
    margin: auto 0;
    animation: lbPopM 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes lbPopM {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ─── 챕터 타이틀 카드 (chapter_title) ─── */
  .ct-scene {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; text-align: center;
  }
  .ct-label {
    font-family: 'Noto Serif KR', 'Times New Roman', serif;
    font-size: 17px; letter-spacing: 0.12em;
    color: var(--accent); font-weight: 500;
    font-style: italic;
    text-shadow: 0 0 12px rgba(255,214,10,0.35);
  }
  .ct-divider {
    width: 50px; height: 2px;
    background: var(--accent);
    animation: ctDividerGrowM 1.2s ease-out;
  }
  @keyframes ctDividerGrowM {
    from { width: 0; opacity: 0; }
    to   { width: 50px; opacity: 1; }
  }
  .ct-title {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
    animation: ctFadeInM 0.8s ease-out;
  }
  @keyframes ctFadeInM {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ct-ready {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--muted); letter-spacing: 0.04em;
    margin-top: 20px;
  }
  .ct-pulse {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    animation: pgiPulse 1.4s ease-in-out infinite;
  }

  /* ─── 게임 시작 전 안내 (pregame_intro) ─── */
  .pgi-scene {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; gap: 24px;
    text-align: center; padding: 16px 4px;
  }
  .pgi-badge {
    align-self: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.15em; color: var(--accent);
    padding: 6px 14px; border: 1px solid var(--accent);
    border-radius: 999px;
    background: rgba(255,214,10,0.08);
  }
  .pgi-title {
    font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .pgi-list {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 10px;
    text-align: left;
    max-width: 100%;
  }
  .pgi-list li {
    font-size: 15px; line-height: 1.45;
    padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px;
    color: rgba(255,255,255,0.92);
  }
  .pgi-list li::before {
    content: '·'; color: var(--accent); margin-right: 8px; font-weight: 800;
  }
  .pgi-ready {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--muted); letter-spacing: 0.04em;
    margin-top: 8px;
  }
  .pgi-pulse {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    animation: pgiPulse 1.4s ease-in-out infinite;
  }
  @keyframes pgiPulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%     { opacity: 0.3; transform: scale(1.4); }
  }
  .scene { flex: 1; display: flex; flex-direction: column; gap: 20px; }
  .scene-prompt { font-size: 26px; font-weight: 600; line-height: 1.3; letter-spacing: -0.01em; }
  .timer-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--muted); padding: 6px 12px; background: var(--surface);
    border-radius: 999px; display: inline-flex; align-items: center;
    gap: 6px; align-self: flex-start;
  }
  .timer-pill.warning { color: var(--danger); }
  .timer-pill b { color: var(--text); font-weight: 700; }
  .choice-list { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: center; }
  .choice-btn {
    width: 100%; background: var(--surface); border: 2px solid var(--line);
    color: var(--text); padding: 22px 20px; border-radius: 14px;
    font-family: inherit; font-size: 18px; font-weight: 500;
    text-align: left; cursor: pointer; transition: all 0.15s;
  }
  .choice-btn:active { transform: scale(0.98); border-color: var(--accent); }
  .choice-btn.selected {
    border-color: var(--accent);
    background: rgba(255,214,10,0.08);
  }
  .choice-btn.selected::before {
    content: '✓ '; color: var(--accent); font-weight: 700;
  }
  .choice-btn.locked { opacity: 0.5; pointer-events: none; }
  .choice-btn.locked.selected { opacity: 1; }
  /* 거부된 선택지 — 탭해도 클릭은 안 먹히고 빨간 흔들림만 매번 발생 */
  .choice-btn.choice-shake {
    animation: choiceShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes choiceShake {
    10%,90% { transform: translateX(-3px); }
    20%,80% { transform: translateX(5px); }
    30%,50%,70% { transform: translateX(-10px); }
    40%,60% { transform: translateX(10px); }
  }
  .ox-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; flex: 1; }
  .ox-btn {
    border: 3px solid var(--line); background: var(--surface); color: var(--text);
    border-radius: 16px; font-family: inherit; font-size: 100px; font-weight: 800;
    cursor: pointer; transition: all 0.15s;
  }
  .ox-btn.O { color: var(--success); }
  .ox-btn.X { color: var(--danger); }
  .ox-btn:active { transform: scale(0.96); }
  .ox-btn.O:active { border-color: var(--success); }
  .ox-btn.X:active { border-color: var(--danger); }
  .ox-btn.selected.O { background: rgba(0,214,143,0.15); border-color: var(--success); }
  .ox-btn.selected.X { background: rgba(255,61,113,0.15); border-color: var(--danger); }
  .ox-btn.locked { opacity: 0.5; pointer-events: none; }
  .ox-btn.locked.selected { opacity: 1; }
  .selection-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.05em;
    padding: 8px 12px; background: var(--surface);
    border-radius: 8px; align-self: flex-start;
    transition: all 0.2s;
  }
  .selection-hint.has-selection { color: var(--accent); }
  .selection-hint.locked { color: var(--danger); }
  .qte-btn {
    flex: 1; background: linear-gradient(135deg, var(--danger), #c41545);
    border: none; color: white; border-radius: 20px;
    font-family: inherit; font-size: 42px; font-weight: 800; cursor: pointer;
    letter-spacing: 0.05em; box-shadow: 0 0 40px rgba(255,61,113,0.4);
    transition: transform 0.1s;
  }
  .qte-btn:active { transform: scale(0.95); }
  .burst-wrap { flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .burst-count {
    text-align: center; font-family: 'JetBrains Mono', monospace;
    font-size: 80px; font-weight: 700; color: var(--accent);
    line-height: 1; padding: 24px 0;
  }
  .burst-btn {
    flex: 1; background: linear-gradient(135deg, var(--accent), #ff8c00);
    border: none; color: #000; border-radius: 20px;
    font-family: inherit; font-size: 36px; font-weight: 800;
    cursor: pointer; box-shadow: 0 0 30px rgba(255,214,10,0.3);
    transition: transform 0.05s;
  }
  .burst-btn:active { transform: scale(0.97); }
  .text-form { display: flex; flex-direction: column; gap: 14px; }
  .text-input {
    background: var(--surface); border: 2px solid var(--line); color: var(--text);
    padding: 20px; border-radius: 14px; font-size: 24px; font-family: inherit;
    text-align: center; transition: border-color 0.2s;
  }
  .text-input:focus { outline: none; border-color: var(--accent); }
  .submit-text {
    background: var(--accent); color: #000; border: none;
    padding: 18px; border-radius: 14px;
    font-family: inherit; font-size: 18px; font-weight: 700; cursor: pointer;
  }
  .submitted {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center; gap: 16px;
  }
  .check {
    width: 100px; height: 100px; border-radius: 50%;
    background: var(--success); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 60px; font-weight: 800;
    animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  .submitted h3 { margin: 0; font-size: 24px; }
  .submitted p { margin: 0; color: var(--muted); font-size: 14px;
                 font-family: 'JetBrains Mono', monospace; }
  .submitted .my-answer {
    margin-top: 12px; padding: 12px 20px; background: var(--surface);
    border-radius: 10px; border: 1px solid var(--line); font-size: 16px;
  }
  /* ── 결과 공개 화면 ── */
  .reveal-screen { flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .reveal-prompt { font-size: 20px; font-weight: 600; line-height: 1.3; letter-spacing: -0.01em; }
  .reveal-status {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.2em;
  }
  .my-answer-pill {
    padding: 10px 16px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px;
    font-size: 14px; color: var(--muted); align-self: flex-start;
  }
  .my-answer-pill b { color: var(--accent); }
  .results-area { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .result-bar { display: flex; flex-direction: column; gap: 6px; }
  .result-bar-header {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 16px;
  }
  .result-bar.mine .result-label::after { content: ' ★'; color: var(--accent); }
  .result-bar-header .result-count {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted);
  }
  .result-bar-track {
    background: var(--surface-2); border-radius: 6px;
    height: 28px; overflow: hidden;
  }
  .result-bar-fill {
    height: 100%; background: var(--muted);
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0%;
  }
  .result-bar.winner .result-bar-fill {
    background: linear-gradient(90deg, var(--success), #00d68f);
  }
  .result-bar.mine .result-bar-fill {
    background: linear-gradient(90deg, var(--accent), #ff8c00);
  }
  .result-bar.mine.winner .result-bar-fill {
    background: linear-gradient(90deg, var(--success), var(--accent));
  }
  .qte-result {
    display: flex; flex-direction: column; gap: 12px;
    padding: 18px; background: var(--surface); border-radius: 12px;
  }
  .qte-result-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 16px;
  }
  .qte-result-row b {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; color: var(--accent);
  }
  .qte-result-mine {
    padding: 14px; border-radius: 10px; text-align: center;
    font-size: 16px; font-weight: 600;
  }
  .qte-result-mine.success { background: rgba(0,214,143,0.15); color: var(--success); }
  .qte-result-mine.fail { background: rgba(255,61,113,0.15); color: var(--danger); }
  .leaderboard-mobile { display: flex; flex-direction: column; gap: 6px; }
  .lb-mobile-row {
    display: grid; grid-template-columns: 32px 1fr 60px;
    align-items: center; padding: 10px 14px;
    background: var(--surface); border-radius: 8px;
    border-left: 3px solid var(--line); font-size: 14px;
  }
  .lb-mobile-row.top1 { border-left-color: var(--accent); }
  .lb-mobile-row.top2 { border-left-color: #c9c9d8; }
  .lb-mobile-row.top3 { border-left-color: #cd7f32; }
  .lb-mobile-row.mine { background: rgba(255,214,10,0.1); border-left-color: var(--accent); }
  .lb-mobile-row .lb-rank {
    font-family: 'JetBrains Mono', monospace; color: var(--muted); font-weight: 700;
  }
  .lb-mobile-row .lb-count {
    text-align: right; font-family: 'JetBrains Mono', monospace;
    font-weight: 700; color: var(--accent);
  }
  .words-mobile { display: flex; flex-wrap: wrap; gap: 8px; }
  .word-chip {
    padding: 8px 14px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px; font-size: 14px;
    animation: drop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .word-chip.mine {
    border-color: var(--accent); background: rgba(255,214,10,0.1); color: var(--accent);
    font-weight: 600;
  }
  @keyframes drop { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .conn-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 8px; background: var(--danger); color: #fff;
    text-align: center; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    transform: translateY(100%); transition: transform 0.3s;
  }
  .conn-bar.show { transform: translateY(0); }

  /* ─── s05_map_game · 지도 정렬 미니게임 ─── */
  .map-hint {
    text-align: center; color: var(--muted); font-size: 13px;
    margin: 4px 0 12px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em; transition: color 0.2s;
  }
  .map-hint.near { color: var(--accent); }
  .map-hint.aligned { color: var(--success); font-weight: 700; }
  .map-progress {
    align-self: center;
    padding: 6px 14px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--muted); font-size: 12px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
    margin: 0 0 8px; transition: all 0.3s;
  }
  .map-progress b { color: var(--accent); font-weight: 800; font-size: 14px; }
  .map-progress.full {
    background: rgba(0,214,143,0.15); border-color: var(--success); color: var(--success);
  }
  .map-progress.full b { color: var(--success); }
  .map-stage {
    position: relative; width: 100%; aspect-ratio: 2520 / 1664;
    margin: 0 auto; background: #000;
    border-radius: 12px; border: 1px solid var(--line);
    overflow: hidden; touch-action: none; user-select: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .map-base {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; -webkit-user-drag: none; user-select: none;
  }
  .map-omap {
    position: absolute;
    /* width/height 은 인라인 style 로 동적 설정 — height: auto 로 종횡비 유지 */
    /* JS sets left/top as % · transform centers the image on that point */
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
    -webkit-user-drag: none; user-select: none;
    mix-blend-mode: screen;
    opacity: 0.95;
    filter: brightness(1.6) contrast(1.4) saturate(1.3);
    transition: filter 0.2s ease;
    will-change: left, top;
  }
  .map-omap.dragging { cursor: grabbing; filter: brightness(1.8) contrast(1.5) saturate(1.4); }
  .map-omap.near     { filter: brightness(2.0) contrast(1.6) saturate(1.5); }
  .map-omap.aligned  {
    filter: brightness(2.4) contrast(1.7) saturate(1.6)
            drop-shadow(0 0 12px rgba(0,214,143,0.7));
    transition: filter 0.5s ease, left 0.35s ease, top 0.35s ease;
  }
  .map-success {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(0,214,143,0.95); color: #000;
    padding: 14px 28px; border-radius: 999px;
    font-weight: 800; font-size: 18px; letter-spacing: -0.01em;
    opacity: 0; pointer-events: none; z-index: 10;
    transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 24px rgba(0,214,143,0.4);
  }
  .map-success.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* ─── s08_2_hidden · 매치-3 미니게임 ─── */
  .m3-stage {
    position: relative;
    display: flex; flex-direction: column; gap: 10px;
    flex: 1;
  }
  .m3-progress {
    align-self: center; padding: 6px 14px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--muted); font-size: 12px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
    transition: all 0.3s;
  }
  .m3-progress b { color: var(--accent); font-weight: 800; font-size: 14px; }
  .m3-progress.full { background: rgba(0,214,143,0.15); border-color: var(--success); color: var(--success); }
  .m3-progress.full b { color: var(--success); }
  .m3-checklist {
    display: flex; gap: 6px; justify-content: center;
  }
  .m3-danger {
    flex: 1; padding: 8px 4px;
    border: 2px solid var(--line); border-radius: 10px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center; gap: 4px;
    font-size: 20px; transition: all 0.3s;
  }
  .m3-danger.cleared {
    border-color: var(--success);
    background: rgba(0,214,143,0.12);
    animation: m3Pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .m3-danger::after {
    content: '·'; color: var(--muted); font-size: 14px; opacity: 0.4;
  }
  .m3-danger.cleared::after {
    content: '✓'; color: var(--success); font-size: 16px; font-weight: 800; opacity: 1;
  }
  @keyframes m3Pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  .m3-hint {
    text-align: center; color: var(--muted); font-size: 12px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.01em;
    line-height: 1.5; padding: 0 4px;
  }
  .m3-hint b { color: var(--accent); font-weight: 700; }
  .m3-grid {
    display: grid; gap: 4px;
    background: var(--surface-2); padding: 6px; border-radius: 12px;
    border: 1px solid var(--line);
    user-select: none; -webkit-user-select: none;
    touch-action: none;        /* 브라우저 스크롤/줌 방지 — 스와이프가 게임 제스처로만 작동 */
  }
  .m3-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(24px, 7vw, 32px);
    background: var(--surface); border-radius: 6px;
    cursor: pointer; transition: transform 0.15s, background 0.15s, border-color 0.15s, opacity 0.2s;
    border: 2px solid transparent;
    -webkit-touch-callout: none;
  }
  .m3-cell.selected {
    border-color: var(--accent);
    background: rgba(255,214,10,0.18);
    transform: scale(1.06);
    box-shadow: 0 4px 12px rgba(255,214,10,0.3);
  }
  .m3-cell.matching {
    background: rgba(0,214,143,0.4);
    transform: scale(0.65);
    opacity: 0.2;
  }
  .m3-cell.locked { pointer-events: none; opacity: 0.55; }
  .m3-banner {
    position: absolute; top: 45%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(0,214,143,0.95); color: #000;
    padding: 16px 28px; border-radius: 999px;
    font-weight: 800; font-size: 18px; letter-spacing: -0.01em;
    opacity: 0; pointer-events: none; z-index: 10;
    transition: opacity 0.3s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);

  }
  .m3-banner.show {

  }
</style>
</head>
<body>

  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {

} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

// ════════════════════════════════════════════════════════════

const firebaseConfig = {

  authDomain: "gen-lang-client-0314320228.firebaseapp.com",
  databaseURL: "https://gen-lang-client-0314320228-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gen-lang-client-0314320228",
  storageBucket: "gen-lang-client-0314320228.firebasestorage.app",
  messagingSenderId: "1077038002206",
  appId: "1:1077038002206:web:217cd7401a119e9aee7e0f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ════════════════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════════════════
let user = JSON.parse(localStorage.getItem('audience_user') || 'null');
let currentSceneId = null;
let currentState = null;
let currentInputs = {};
let inputsUnsubscribe = null;
let submitted = false;
let burstCount = 0;
let serverOffset = 0;
let timerId = null;
let burstAutoSubmitId = null;
let stateUnsubscribe = null;

// 서버 시간 오프셋
onValue(ref(db, '.info/serverTimeOffset'), (snap) => {

// 연결 상태

// ════════════════════════════════════════════════════════════
// 화면 렌더링
// ════════════════════════════════════════════════════════════
function renderJoin() {
  document.getElementById('userTagText').textContent = '미접속';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('body').innerHTML = `
    <div class="join">
      <div>
        <h1>참여하기</h1>
        <p>닉네임을 입력하고 시작하세요.<br>메인 화면에 표시될 수 있어요.</p>
      </div>
      <input class="nick-input" id="nickInput" maxlength="12"
             placeholder="닉네임 (최대 12자)" autocomplete="off">

  `;

  document.getElementById('joinBtn').onclick = doJoin;
  document.getElementById('nickInput').onkeydown = (e) => {

}

async function doJoin() {
  const nick = document.getElementById('nickInput').value.trim();
  if (!nick) return;
  user = {
    user_id: 'u_' + Math.random().toString(36).slice(2, 10),
    nickname: nick
  };
  localStorage.setItem('audience_user', JSON.stringify(user));
  await set(ref(db, `users/${user.user_id}`), {
    nickname: nick,
    joined_at: Date.now()
  });
  document.getElementById('userTagText').innerHTML = `👤 <b>${escapeHtml(user.nickname)}</b>`;
  document.getElementById('logoutBtn').style.display = 'inline-block';
  subscribeToState();
}

function renderWaiting() {
  document.getElementById('body').innerHTML = `
    <div class="waiting">
      <div class="waiting-dot"></div>

    </div>
  `;

}

function renderReveal() {
  document.getElementById('body').innerHTML = `
    <div class="waiting">
      <div style="font-size:72px">🎬</div>
      <h2>결과 확인 중</h2>
      <p>메인 화면을 봐주세요</p>
    </div>
  `;
  stopTimer();
}

// 결과 공개 화면 — 청중 폰에서 직접 집계 결과 표시
function renderRevealResults(state, inputs) {
  const p = state.payload || {};
  const type = state.type;
  const myInput = user ? inputs[user.user_id] : null;
  const myAnswer = formatMyAnswer(myInput);
  const totalSubmissions = Object.keys(inputs).length;

  let resultsHtml = '';

  if (type === 'choice' || type === 'ox') {
    const tally = aggregateInputs(type, inputs);
    const options = type === 'ox' ? ['O', 'X'] : (p.options || []);
    const max = Math.max(1, ...Object.values(tally), 1);
    const winnerKey = Object.entries(tally).sort((a,b)=>b[1]-a[1])[0]?.[0];

    resultsHtml = options.map(opt => {
      const count = tally[opt] || 0;
      const pct = totalSubmissions ? Math.round((count / totalSubmissions) * 100) : 0;
      const isWinner = opt === winnerKey && count > 0;
      const isMine = myInput?.input?.choice === opt;
      return `
        <div class="result-bar ${isWinner ? 'winner' : ''} ${isMine ? 'mine' : ''}">
          <div class="result-bar-header">
            <span class="result-label">${escapeHtml(opt)}</span>
            <span class="result-count">${count}표 · ${pct}%</span>
          </div>
          <div class="result-bar-track">
            <div class="result-bar-fill" style="width:${(count/max)*100}%"></div>
          </div>
        </div>`;
    }).join('');
  } else if (type === 'qte') {
    const reacted = totalSubmissions;
    const myReact = !!myInput;
    resultsHtml = `
      <div class="qte-result">
        <div class="qte-result-row">
          <span>반응한 사람</span>
          <b>${reacted}명</b>
        </div>
        <div class="qte-result-mine ${myReact ? 'success' : 'fail'}">
          ${myReact ? '✓ 당신은 반응했어요!' : '✗ 놓쳤어요'}
        </div>
      </div>`;
  } else if (type === 'qte_burst') {
    const tally = aggregateInputs(type, inputs);
    const rows = Object.entries(tally).sort((a,b) => b[1] - a[1]);
    const myCount = myInput?.input?.count || 0;
    const myRankIdx = rows.findIndex(([name]) => name === user?.nickname);
    const myRank = myRankIdx >= 0 ? myRankIdx + 1 : null;

    resultsHtml = `
      <div class="qte-result">
        <div class="qte-result-mine success">
          나의 기록: <b style="font-size:24px">${myCount}회</b>${myRank ? ` · #${myRank}` : ''}
        </div>
      </div>
      <div class="leaderboard-mobile">
        ${rows.slice(0, 5).map(([name, count], i) => {
          const cls = [
            i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '',
            name === user?.nickname ? 'mine' : ''
          ].filter(Boolean).join(' ');
          return `<div class="lb-mobile-row ${cls}">
            <span class="lb-rank">#${i+1}</span>
            <span class="lb-name">${escapeHtml(name)}</span>
            <span class="lb-count">${count}</span>
          </div>`;
        }).join('')}
      </div>`;
  } else if (type === 'text') {
    const tally = aggregateInputs(type, inputs);
    const words = Object.entries(tally).sort((a,b) => b[1] - a[1]);
    const myWord = myInput?.input?.text?.trim();
    resultsHtml = words.length
      ? `<div class="words-mobile">${
          words.map(([w, c]) => {
            const isMine = myWord === w;
            return `<div class="word-chip ${isMine ? 'mine' : ''}">
              ${escapeHtml(w)}${c > 1 ? ` <span style="opacity:.7">×${c}</span>` : ''}
            </div>`;
          }).join('')
        }</div>`
      : '<div style="color:var(--muted);font-size:13px">응답 없음</div>';
  } else if (type === 'map_align' || type === 'match3') {
    const isMatch3 = type === 'match3';
    const successKey = isMatch3 ? 'eliminated' : 'aligned';
    const missionLabel = isMatch3 ? '위험 요소 제거' : '지도 완성';
    const needed = p.winners_needed ?? 3;
    // 성공자만 took_ms 순으로 정렬 (없으면 timestamp 폴백)
    const ranked = Object.entries(inputs)
      .map(([uid, i]) => ({ uid, ...i }))
      .filter(i => i?.input?.[successKey])
      .sort((a, b) => {
        const at = a.input?.took_ms ?? a.timestamp ?? 0;
        const bt = b.input?.took_ms ?? b.timestamp ?? 0;
        return at - bt;
      });
    const winners = ranked.slice(0, needed);

    // 내 순위 (전체 ranked 기준)
    const myRank = user ? ranked.findIndex(r => r.uid === user.user_id) : -1;
    const myInTop = myRank >= 0 && myRank < needed;
    const myDone = !!myInput?.input?.[successKey];

    const rankEmoji = ['🥇','🥈','🥉','4','5','6','7'];
    const slotsHtml = Array.from({ length: needed }, (_, idx) => {
      const w = winners[idx];
      const rank = rankEmoji[idx] || `${idx + 1}`;
      if (w) {
        const secs = (w.input?.took_ms != null) ? (w.input.took_ms / 1000).toFixed(1) + 's' : '';
        const isMine = user && w.uid === user.user_id;
        return `
          <div class="ma-slot-m ma-slot-m-filled ${isMine ? 'ma-slot-m-mine' : ''}">
            <span class="ma-slot-m-rank">${rank}</span>
            <span class="ma-slot-m-name">${escapeHtml(w.nickname || '익명')}${isMine ? ' (나)' : ''}</span>
            <span class="ma-slot-m-time">${secs}</span>
          </div>`;
      }
      return `
        <div class="ma-slot-m ma-slot-m-empty">
          <span class="ma-slot-m-rank">${rank}</span>
          <span class="ma-slot-m-name">미완성</span>
          <span class="ma-slot-m-time">—</span>
        </div>`;
    }).join('');

    const myStatusHtml = myInTop
      ? `<div class="ma-me ma-me-ok">🎉 ${myRank + 1}등으로 ${missionLabel}! 미션 성공에 기여했어요</div>`
      : myDone
        ? `<div class="ma-me ma-me-late">✓ 완성했지만 선착순 ${needed}명 안엔 못 들었어요 (${myRank + 1}등)</div>`
        : `<div class="ma-me ma-me-fail">😢 이번엔 시간 안에 못 끝냈어요</div>`;

    resultsHtml = `
      <style>
        .ma-slots-m { display: flex; flex-direction: column; gap: 10px; }
        .ma-slot-m {
          display: flex; align-items: center; gap: 12px;
          padding: 14px 16px; border-radius: 12px;
          border: 1px solid var(--line); background: var(--surface);
        }
        .ma-slot-m-rank {
          font-size: 24px; font-weight: 800;
          width: 36px; text-align: center; flex-shrink: 0;
        }
        .ma-slot-m-name {
          flex: 1; font-size: 17px; font-weight: 700;
          overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .ma-slot-m-time {
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px; color: var(--muted); flex-shrink: 0;
        }
        .ma-slot-m-empty { opacity: 0.45; }
        .ma-slot-m-empty .ma-slot-m-name { color: var(--muted); font-weight: 400; }
        .ma-slot-m-filled {
          border-color: var(--accent);
          background: linear-gradient(180deg, rgba(255,214,10,0.10), rgba(255,214,10,0.02));
        }
        .ma-slot-m-filled .ma-slot-m-time { color: var(--accent); font-weight: 700; }
        .ma-slot-m-mine {
          border-color: var(--success);
          background: linear-gradient(180deg, rgba(0,214,143,0.16), rgba(0,214,143,0.04));
          box-shadow: 0 4px 16px rgba(0,214,143,0.2);
        }
        .ma-me {
          margin-top: 14px; padding: 14px 16px;
          border-radius: 12px; font-weight: 700; font-size: 15px;
          text-align: center; line-height: 1.4;
        }
        .ma-me-ok   { background: rgba(0,214,143,0.15); color: var(--success); border: 1px solid var(--success); }
        .ma-me-late { background: rgba(255,214,10,0.10); color: var(--accent);  border: 1px solid var(--accent); }
        .ma-me-fail { background: var(--surface-2); color: var(--muted); border: 1px solid var(--line); }
      </style>
      <div class="ma-slots-m">${slotsHtml}</div>
      ${myStatusHtml}
    `;
  }

  document.getElementById('body').innerHTML = `
    <div class="reveal-screen">
      <div class="reveal-status">결과 공개 · 총 ${totalSubmissions}명 참여</div>
      <div class="reveal-prompt">${escapeHtml(p.prompt || '')}</div>
      ${myAnswer ? `<div class="my-answer-pill">내 응답: <b>${escapeHtml(myAnswer)}</b></div>` : ''}
      <div class="results-area">${resultsHtml}</div>
    </div>
  `;
  stopTimer();
}

function formatMyAnswer(myInput) {
  if (!myInput?.input) return null;
  const p = myInput.input;
  if (p.choice) return p.choice;
  if (p.text) return p.text;
  if (p.count != null) return `${p.count} taps`;
  if (p.aligned) return '✓ 지도 완성';
  if (p.eliminated) return '✓ 위험요소 제거';
  if (p.tapped_at) return '✓ 반응';
  return null;
}

function aggregateInputs(type, inputs) {
  const t = {};
  for (const userId in inputs) {
    const i = inputs[userId];
    if (!i) continue;
    if (type === 'choice' || type === 'ox') {
      const k = i.input?.choice;
      if (k) t[k] = (t[k] || 0) + 1;
    } else if (type === 'qte_burst') {
      t[i.nickname] = i.input?.count || 0;
    } else if (type === 'text') {
      const w = (i.input?.text || '').trim();
      if (w) t[w] = (t[w] || 0) + 1;
    }
  }
  return t;
}

function renderScene(state) {
  const p = state.payload || {};
  const type = state.type;

  // map_align 은 전용 렌더러 호출 후 종료 — 일반 input UI 와 분기 다름
  if (type === 'map_align') {
    renderMapAlignGame(state);
    return;
  }

  // match3 도 전용 렌더러
  if (type === 'match3') {
    renderMatch3Game(state);
    return;
  }

  // logic_break: 6-3 머리의 방 미니게임
  if (type === 'logic_break') {
    renderLogicBreakGame(state);
    return;
  }

  // chapter_title: 챕터 시작 안내 — 진행자가 클릭할 때까지 대기
  if (type === 'chapter_title') {
    document.getElementById('body').innerHTML = `
      <div class="scene ct-scene">
        <div class="ct-label">${escapeHtml(p.chapter_label || '')}</div>
        <div class="ct-divider"></div>
        <div class="ct-title">${escapeHtml(p.title || '')}</div>
        <div class="ct-ready">
          <div class="ct-pulse"></div>
          <div>다음 챕터 곧 시작</div>
        </div>
      </div>
    `;
    stopTimer();
    return;
  }

  // pregame_intro: 게임 시작 직전 안내 — 진행자가 시작 버튼 누를 때까지 대기
  if (type === 'pregame_intro') {
    const desc = Array.isArray(p.description) ? p.description : [p.description || ''];
    const descHtml = desc.map(line => `<li>${escapeHtml(line)}</li>`).join('');
    document.getElementById('body').innerHTML = `
      <div class="scene pgi-scene">
        <div class="pgi-badge">🎮 GAME · 준비</div>
        <div class="pgi-title">${escapeHtml(p.title || '게임 시작')}</div>
        <ul class="pgi-list">${descHtml}</ul>
        <div class="pgi-ready">
          <div class="pgi-pulse"></div>
          <div>진행자가 시작하면 자동으로 게임이 시작됩니다</div>
        </div>
      </div>
    `;
    stopTimer();
    return;
  }

  // manual: 진행자가 메인에서 수동 진행 — 청중은 안내만 보고 대기
  if (type === 'manual') {
    document.getElementById('body').innerHTML = `
      <div class="scene">
        <div class="scene-prompt">${escapeHtml(p.prompt || '잠시만 기다려주세요')}</div>
        <div class="waiting" style="margin-top: 16px;">
          <div class="waiting-dot"></div>
          <h2>실시간 미션 진행 중</h2>
          <p>지금 진행 중인 미션을<br>주변에서 확인해주세요 👀</p>
        </div>
      </div>
    `;
    stopTimer();
    return;
  }

  const timerHtml = state.duration > 0
    ? `<div class="timer-pill" id="timer">⏱ <b>--</b>초 남음</div>` : '';

  let inputUi = '';

  if (type === 'choice') {
    const rejectSet = new Set(p.reject_options || []);
    inputUi = `<div class="choice-list">${
      (p.options || []).map(opt => {
        const isReject = rejectSet.has(opt);
        return `<button class="choice-btn"
                       data-opt='${escapeHtml(JSON.stringify(opt))}'
                       ${isReject ? 'data-reject="1"' : ''}>
          ${escapeHtml(opt)}
        </button>`;
      }).join('')
    }</div>`;
  } else if (type === 'ox') {
    inputUi = `<div class="ox-buttons">
      <button class="ox-btn O" data-ox="O">O</button>
      <button class="ox-btn X" data-ox="X">X</button>
    </div>`;
  } else if (type === 'qte') {
    inputUi = `<button class="qte-btn" id="qteBtn">TAP!</button>`;
  } else if (type === 'qte_burst') {
    inputUi = `
      <div class="burst-wrap">
        <div class="burst-count" id="burstCount">0</div>
        <button class="burst-btn" id="burstBtn">TAP TAP TAP</button>
      </div>`;
  } else if (type === 'text') {
    inputUi = `
      <div class="text-form">
        <input class="text-input" id="textInput" maxlength="20"
               placeholder="한 단어로 입력..." autocomplete="off">
        <button class="submit-text" id="textSubmit">제출</button>
      </div>`;
  }

  const hintHtml = (type === 'choice' || type === 'ox')
    ? `<div class="selection-hint" id="selectionHint">탭해서 선택 · 시간 내 자유롭게 변경 가능</div>`
    : '';

  document.getElementById('body').innerHTML = `
    <div class="scene">
      <div class="scene-prompt">${escapeHtml(p.prompt || '')}</div>
      ${timerHtml}
      ${hintHtml}
      ${inputUi}
    </div>
  `;

  // 이벤트 바인딩
  if (type === 'choice') {
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.onclick = () => {
        // reject 옵션은 매 탭마다 빨간 흔들림만 — 비활성화/안내 없이 계속 탭 가능하지만 클릭 안 먹힘
        if (btn.dataset.reject === '1') {
          if (navigator.vibrate) try { navigator.vibrate(60); } catch {}
          btn.classList.remove('choice-shake');
          void btn.offsetWidth;   // reflow → 매번 애니메이션 재시작
          btn.classList.add('choice-shake');
          return;
        }
        const opt = JSON.parse(btn.dataset.opt);
        submitChoice(opt);
      };
    });
  } else if (type === 'ox') {
    document.querySelectorAll('.ox-btn').forEach(btn => {
      btn.onclick = () => submitChoice(btn.dataset.ox);
    });
  } else if (type === 'qte') {
    document.getElementById('qteBtn').onclick = submitQTE;
  } else if (type === 'qte_burst') {
    document.getElementById('burstBtn').onclick = tickBurst;
  } else if (type === 'text') {
    document.getElementById('textSubmit').onclick = submitText;
    document.getElementById('textInput').focus();
    document.getElementById('textInput').onkeydown = (e) => {
      if (e.key === 'Enter') submitText();
    };
  }

  // 이미 선택했던 게 있으면 시각적으로 복원 (예: 새로고침 후 동일 user_id 면)
  if ((type === 'choice' || type === 'ox') && user) {
    const myInput = currentInputs[user.user_id];
    if (myInput?.input?.choice) {
      updateChoiceSelection(myInput.input.choice);
    }
  }

  startTimerLoop(state);

  // qte_burst 시간 종료 시 자동 제출
  if (type === 'qte_burst') {
    const remaining = state.started_at + state.duration - serverNow();
    burstCount = 0;
    if (burstAutoSubmitId) clearTimeout(burstAutoSubmitId);
    burstAutoSubmitId = setTimeout(() => {
      // 예약된 throttled write 가 final submit 뒤에 도착해서 덮어쓰지 않도록 취소
      if (burstWriteTimer) { clearTimeout(burstWriteTimer); burstWriteTimer = null; }
      burstWritePending = false;
      if (!submitted && burstCount > 0) {
        submitInput({ count: burstCount }, `${burstCount} taps`);
      } else if (!submitted) {
        submitted = true;
        renderSubmitted('참여 안 함');
      }
    }, Math.max(0, remaining));
  }
}

// s05_map_game — 지도 정렬 미니게임
// ════════════════════════════════════════════════════════════
function renderMapAlignGame(state) {
  const p = state.payload || {};
  const cfg = {
    mapSrc:   p.map_src    || 'map.png',
    omapSrc:  p.omap_src   || 'omap.png',
    targetX:  p.target_x_pct  ?? 50,
    targetY:  p.target_y_pct  ?? 50,
    tol:      p.tolerance_pct ?? 4,
    startDx:  p.start_dx_pct  ?? 22,
    startDy:  p.start_dy_pct  ?? -14,
    omapWidthPct: p.omap_width_pct ?? 100,  // omap 의 가로 크기 (map 대비 %) — default 100 (옛 동작)
  };

  const timerHtml = state.duration > 0
    ? `<div class="timer-pill" id="timer">⏱ <b>--</b>초 남음</div>` : '';

  document.getElementById('body').innerHTML = `
    <div class="scene">
      <div class="scene-prompt">${escapeHtml(p.prompt || '')}</div>
      ${timerHtml}
      <div class="map-progress" id="mapProgress">선착순 ${p.winners_needed ?? 3}명 도전 · <b id="mapProgressN">0</b> / ${p.winners_needed ?? 3}</div>
      <div class="map-hint" id="mapHint">👆 빨간 지도를 드래그해서 정확히 겹쳐보세요</div>
      <div class="map-stage" id="mapStage">
        <img class="map-base" id="mapBase" src="${escapeHtml(cfg.mapSrc)}" alt="map" draggable="false">
        <img class="map-omap" id="mapOmap" src="${escapeHtml(cfg.omapSrc)}" alt="overlay" draggable="false"
             style="width: ${cfg.omapWidthPct}%; height: auto;">
        <div class="map-success" id="mapSuccess">✓ 완벽한 정렬!</div>
      </div>
    </div>
  `;

  initMapAlignDrag(cfg);
  startTimerLoop(state);
  updateMapAlignProgress();  // 진입 시점에도 한 번 그려주기 (이미 누군가 완료했을 수도)
}

// 실시간 선착순 카운터 — inputs 구독 콜백에서 호출됨
function updateMapAlignProgress() {
  const nEl = document.getElementById('mapProgressN');
  if (!nEl) return;
  const aligned = Object.values(currentInputs).filter(i => i?.input?.aligned).length;
  const needed = currentState?.payload?.winners_needed ?? 3;
  nEl.textContent = aligned;
  const wrap = document.getElementById('mapProgress');
  if (wrap) {
    wrap.classList.toggle('full', aligned >= needed);
  }
}

function initMapAlignDrag(cfg) {
  const stage    = document.getElementById('mapStage');
  const omap     = document.getElementById('mapOmap');
  const hintEl   = document.getElementById('mapHint');
  const okEl     = document.getElementById('mapSuccess');

  // omap 의 중심점을 (targetX + startDx, targetY + startDy) 로 시작
  let posX = cfg.targetX + cfg.startDx;
  let posY = cfg.targetY + cfg.startDy;
  let aligned = false;

  function applyPos() {
    omap.style.left = posX + '%';
    omap.style.top  = posY + '%';
  }
  applyPos();

  function distance() {
    const dx = posX - cfg.targetX;
    const dy = posY - cfg.targetY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function updateHint() {
    if (aligned) return;
    const d = distance();
    if (d <= cfg.tol) {
      omap.classList.add('near');
      hintEl.textContent = '거의 다 됐어요! 손 떼면 확정';
      hintEl.classList.add('near');
    } else if (d <= cfg.tol * 2.5) {
      omap.classList.add('near');
      hintEl.textContent = '🔥 거의 다 왔어요...';
      hintEl.classList.add('near');
    } else {
      omap.classList.remove('near');
      hintEl.textContent = '👆 빨간 지도를 드래그해서 정확히 겹쳐보세요';
      hintEl.classList.remove('near');
    }
  }

  function onAligned() {
    if (aligned || submitted || !currentSceneId || !user) return;
    aligned = true;
    submitted = true;

    // 완전 정답 위치로 살짝 스냅 (시각적 만족감)
    posX = cfg.targetX;
    posY = cfg.targetY;
    applyPos();

    omap.classList.remove('near');
    omap.classList.add('aligned');
    hintEl.textContent = '🎉 지도 완성!';
    hintEl.classList.remove('near');
    hintEl.classList.add('aligned');
    okEl.classList.add('show');

    detach();

    // Firebase 에 결과 기록 (UI 는 그대로 — renderSubmitted 호출 안 함)
    const startedAt = currentState?.started_at || serverNow();
    set(ref(db, `inputs/${currentSceneId}/${user.user_id}`), {
      timestamp: serverNow(),
      nickname: user.nickname,
      input: { aligned: true, took_ms: serverNow() - startedAt }
    }).catch(err => console.warn('map_align submit failed', err));
  }

  // ── 드래그 핸들링 (mouse + touch 통합) ──
  let dragging = false;
  let startCX = 0, startCY = 0;
  let startPX = 0, startPY = 0;
  let rect = null;

  function pt(e) {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    if (aligned || submitted) return;
    e.preventDefault();
    dragging = true;
    rect = stage.getBoundingClientRect();
    const q = pt(e);
    startCX = q.x; startCY = q.y;
    startPX = posX; startPY = posY;
    omap.classList.add('dragging');
  }

  function onMove(e) {
    if (!dragging || !rect) return;
    e.preventDefault();
    const q = pt(e);
    const dxPct = ((q.x - startCX) / rect.width)  * 100;
    const dyPct = ((q.y - startCY) / rect.height) * 100;
    // 화면 밖으로 너무 멀리 나가지 않도록 살짝 클램프
    posX = Math.max(-30, Math.min(130, startPX + dxPct));
    posY = Math.max(-30, Math.min(130, startPY + dyPct));
    applyPos();
    updateHint();
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    omap.classList.remove('dragging');
    if (distance() <= cfg.tol) onAligned();
  }

  function detach() {
    omap.removeEventListener('mousedown',  onDown);
    omap.removeEventListener('touchstart', onDown);
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('mouseup',   onUp);
    window.removeEventListener('touchend',  onUp);
    window.removeEventListener('touchcancel', onUp);
  }

  omap.addEventListener('mousedown',  onDown);
  omap.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup',   onUp);
  window.addEventListener('touchend',  onUp);
  window.addEventListener('touchcancel', onUp);
}

// ════════════════════════════════════════════════════════════
// s08_2_hidden — 매치-3 미니게임 (애니팡/캔디크러쉬 스타일)
//   인접 두 타일 탭 → 자리 바꿈 → 같은 이모지 3개 일렬 시 제거 + 떨어지기 + 채움
//   🔫 🔪 🏏 각각 한 번씩 매칭하면 클리어 → Firebase 에 eliminated:true 기록
// ════════════════════════════════════════════════════════════
function renderMatch3Game(state) {
  const p = state.payload || {};
  const cfg = {
    dangers: p.dangers || ['🔫','🔪','🏏'],
    safes:   p.safes   || ['🍎','🍋','🍇','🍓','🌸'],
    rows:    p.rows    || 7,
    cols:    p.cols    || 6,
    winnersNeeded: p.winners_needed ?? 3,
  };

  const timerHtml = state.duration > 0
    ? `<div class="timer-pill" id="timer">⏱ <b>--</b>초 남음</div>` : '';

  const checklistHtml = cfg.dangers.map(d =>
    `<div class="m3-danger" data-emoji="${d}">${d}</div>`
  ).join('');

  document.getElementById('body').innerHTML = `
    <div class="scene m3-stage">
      <div class="scene-prompt">${escapeHtml(p.prompt || '')}</div>
      ${timerHtml}
      <div class="m3-progress" id="m3Progress">선착순 ${cfg.winnersNeeded}명 도전 · <b id="m3ProgressN">0</b> / ${cfg.winnersNeeded}</div>
      <div class="m3-hint">↔️ 인접한 두 타일을 <b>스와이프</b> 또는 <b>두 번 탭</b>해서 같은 이모지 3개 일렬로!</div>
      <div class="m3-checklist">${checklistHtml}</div>
      <div class="m3-grid" id="m3Grid" style="grid-template-columns: repeat(${cfg.cols}, 1fr);"></div>
      <div class="m3-banner" id="m3Banner">🎉 위험요소 모두 제거 완료!</div>
      <div class="m3-banner m3-banner-info" id="m3Reshuffle">🔀 보드 섞는 중...</div>
    </div>
  `;

  // ── 클로저 안에 게임 상태 보관 ─────────────────────────────
  const grid = makeInitialGrid(cfg);
  const clearedDangers = new Set();
  let selected = null;
  let busy = false;
  let won = false;

  function paint() {
    const gridEl = document.getElementById('m3Grid');
    if (!gridEl) return;
    let html = '';
    for (let r = 0; r < cfg.rows; r++) {
      for (let c = 0; c < cfg.cols; c++) {
        html += `<div class="m3-cell${won ? ' locked' : ''}" data-r="${r}" data-c="${c}">${grid[r][c] || ''}</div>`;
      }
    }
    gridEl.innerHTML = html;
    // 선택된 셀 표시 복원 (이벤트 핸들러는 그리드 레벨에 한 번만 — paint 마다 재바인딩 안 함)
    if (selected) {
      const sel = gridEl.querySelector(`.m3-cell[data-r="${selected.r}"][data-c="${selected.c}"]`);
      if (sel) sel.classList.add('selected');
    }
  }

  function refreshChecklist() {
    cfg.dangers.forEach(d => {
      const el = document.querySelector(`.m3-danger[data-emoji="${d}"]`);
      if (el) el.classList.toggle('cleared', clearedDangers.has(d));
    });
  }

  function setSelected(r, c) {
    document.querySelectorAll('.m3-cell.selected').forEach(el => el.classList.remove('selected'));
    selected = (r === null) ? null : { r, c };
    if (selected) {
      const el = document.querySelector(`.m3-cell[data-r="${r}"][data-c="${c}"]`);
      if (el) el.classList.add('selected');
    }
  }

  async function onTap(r, c) {
    if (busy || won) return;
    if (!selected) { setSelected(r, c); return; }
    if (selected.r === r && selected.c === c) { setSelected(null); return; }
    const dr = Math.abs(selected.r - r);
    const dc = Math.abs(selected.c - c);
    if (dr + dc === 1) {
      const r1 = selected.r, c1 = selected.c;
      setSelected(null);
      await trySwap(r1, c1, r, c);
    } else {
      setSelected(r, c);
    }
  }

  async function trySwap(r1, c1, r2, c2) {
    busy = true;
    swapTiles(grid, r1, c1, r2, c2);
    paint();
    await m3Sleep(120);

    const initialMatches = findMatches(grid);
    if (initialMatches.length === 0) {
      // 매치 안 만들면 되돌리기
      swapTiles(grid, r1, c1, r2, c2);
      paint();
      busy = false;
      return;
    }

    // 캐스케이드 처리
    while (true) {
      const ms = findMatches(grid);
      if (ms.length === 0) break;

      // 위험 요소 클리어 체크
      for (const { r, c } of ms) {
        const e = grid[r][c];
        if (cfg.dangers.includes(e)) clearedDangers.add(e);
      }

      // 매치 셀 시각화
      for (const { r, c } of ms) {
        const el = document.querySelector(`.m3-cell[data-r="${r}"][data-c="${c}"]`);
        if (el) el.classList.add('matching');
      }
      refreshChecklist();
      await m3Sleep(280);

      // 제거 + 중력 + 리필
      for (const { r, c } of ms) grid[r][c] = null;
      applyGravity(grid);
      refillGrid(grid, cfg);
      paint();
      await m3Sleep(180);
    }

    // 승리 체크
    if (!won && cfg.dangers.every(d => clearedDangers.has(d))) {
      won = true;
      onWin();
    }

    // 보드가 막혔는지 체크 — 한 수도 둘 수 없으면 셔플
    if (!won && !hasPossibleMove(grid, cfg)) {
      showReshuffleBanner();
      await m3Sleep(700);
      reshuffleBoard(grid, cfg);
      paint();
      hideReshuffleBanner();
    }

    busy = false;
  }

  function showReshuffleBanner() {
    const b = document.getElementById('m3Reshuffle');
    if (b) b.classList.add('show');
  }
  function hideReshuffleBanner() {
    const b = document.getElementById('m3Reshuffle');
    if (b) b.classList.remove('show');
  }

  function onWin() {
    if (submitted || !currentSceneId || !user) return;
    submitted = true;
    document.getElementById('m3Banner')?.classList.add('show');
    // 그리드 잠금
    document.querySelectorAll('.m3-cell').forEach(el => el.classList.add('locked'));
    // Firebase 기록
    const startedAt = currentState?.started_at || serverNow();
    set(ref(db, `inputs/${currentSceneId}/${user.user_id}`), {
      timestamp: serverNow(),
      nickname: user.nickname,
      input: { eliminated: true, took_ms: serverNow() - startedAt }
    }).catch(err => console.warn('match3 submit failed', err));
  }

  paint();
  refreshChecklist();
  startTimerLoop(state);
  updateMatch3Progress();   // 입장 시점 카운터 한 번 그리기

  // ── 제스처 핸들러 (탭 + 스와이프) ─────────────────────────
  // - 인접 셀로 짧게 드래그하면 스와이프로 swap (캔디크러쉬 스타일)
  // - 짧게 탭하면 첫 셀 선택, 다른 인접 셀 탭하면 swap (탭-탭 백업)
  // - 그리드 레벨에 단 한 번 바인딩 → paint() 가 셀을 교체해도 계속 작동
  const gridEl = document.getElementById('m3Grid');
  let dragStart = null;
  const SWIPE_THRESHOLD = 16;  // 픽셀 — 이 이상 움직이면 스와이프로 인정

  gridEl.addEventListener('pointerdown', (e) => {
    if (busy || won) return;
    const el = e.target.closest('.m3-cell');
    if (!el) return;
    try { gridEl.setPointerCapture(e.pointerId); } catch {}
    dragStart = {
      r: +el.dataset.r,
      c: +el.dataset.c,
      x: e.clientX,
      y: e.clientY,
      pointerId: e.pointerId,
      swiped: false
    };
  });

  gridEl.addEventListener('pointermove', (e) => {
    if (!dragStart || dragStart.swiped) return;
    if (e.pointerId !== dragStart.pointerId) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_THRESHOLD) return;

    // 방향 결정 (수평/수직 중 큰 쪽)
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      dc = dx > 0 ? 1 : -1;
    } else {
      dr = dy > 0 ? 1 : -1;
    }
    const r2 = dragStart.r + dr;
    const c2 = dragStart.c + dc;
    if (r2 < 0 || r2 >= cfg.rows || c2 < 0 || c2 >= cfg.cols) return;

    dragStart.swiped = true;
    setSelected(null);
    trySwap(dragStart.r, dragStart.c, r2, c2);
    e.preventDefault();
  });

  gridEl.addEventListener('pointerup', (e) => {
    if (!dragStart) return;
    if (e.pointerId !== dragStart.pointerId) { dragStart = null; return; }
    if (!dragStart.swiped) {
      // 움직임 거의 없었으면 탭으로 처리
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const cell = el?.closest('.m3-cell');
      if (cell && +cell.dataset.r === dragStart.r && +cell.dataset.c === dragStart.c) {
        onTap(dragStart.r, dragStart.c);
      }
    }
    dragStart = null;
    try { gridEl.releasePointerCapture(e.pointerId); } catch {}
  });

  gridEl.addEventListener('pointercancel', () => { dragStart = null; });
}

// ── match-3 보조 함수들 (순수 로직) ─────────────────────────
function m3Sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function swapTiles(grid, r1, c1, r2, c2) {
  const t = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = t;
}

function makeInitialGrid(cfg) {
  // 최대 20번 시도 — 한 수도 둘 수 없는 보드면 다시 만든다
  let grid;
  for (let attempt = 0; attempt < 20; attempt++) {
    grid = [];
    for (let r = 0; r < cfg.rows; r++) {
      grid.push(new Array(cfg.cols).fill(null));
      for (let c = 0; c < cfg.cols; c++) {
        grid[r][c] = pickInitialTile(grid, r, c, cfg);
      }
    }
    if (hasPossibleMove(grid, cfg)) return grid;
  }
  return grid;  // 폴백 (사실상 도달 안 함)
}

// 인접한 두 타일을 바꿔서 매치를 만들 수 있는 swap 이 보드에 하나라도 있는가?
// (모든 인접 쌍을 한 번씩 가상으로 swap 해보고 매치 발생 여부 확인 — O(rows*cols) cheap)
function hasPossibleMove(grid, cfg) {
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      // 오른쪽 인접 swap 시뮬레이션
      if (c + 1 < cfg.cols) {
        swapTiles(grid, r, c, r, c + 1);
        const ok = findMatches(grid).length > 0;
        swapTiles(grid, r, c, r, c + 1);   // 복구
        if (ok) return true;
      }
      // 아래 인접 swap 시뮬레이션
      if (r + 1 < cfg.rows) {
        swapTiles(grid, r, c, r + 1, c);
        const ok = findMatches(grid).length > 0;
        swapTiles(grid, r, c, r + 1, c);   // 복구
        if (ok) return true;
      }
    }
  }
  return false;
}

// 보드가 막혔을 때 (둘 수 있는 수가 없을 때) 타일 재배치
// Fisher-Yates 셔플로 자리만 섞고, 매치/플레이 가능 보드가 될 때까지 반복
function reshuffleBoard(grid, cfg) {
  const tiles = [];
  for (let r = 0; r < cfg.rows; r++) for (let c = 0; c < cfg.cols; c++) tiles.push(grid[r][c]);

  for (let attempt = 0; attempt < 30; attempt++) {
    // Fisher-Yates
    for (let i = tiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    let idx = 0;
    for (let r = 0; r < cfg.rows; r++) for (let c = 0; c < cfg.cols; c++) grid[r][c] = tiles[idx++];
    // 초기 매치 없고 + 둘 수 있는 수가 있으면 OK
    if (findMatches(grid).length === 0 && hasPossibleMove(grid, cfg)) return;
  }
  // 최후의 수단 — 완전 새로 생성
  const fresh = makeInitialGrid(cfg);
  for (let r = 0; r < cfg.rows; r++) for (let c = 0; c < cfg.cols; c++) grid[r][c] = fresh[r][c];
}

function pickInitialTile(grid, r, c, cfg) {
  const pool = [...cfg.dangers, ...cfg.safes];
  const forbidden = new Set();
  if (c >= 2 && grid[r][c - 1] === grid[r][c - 2]) forbidden.add(grid[r][c - 1]);
  if (r >= 2 && grid[r - 1][c] === grid[r - 2][c]) forbidden.add(grid[r - 1][c]);
  const allowed = pool.filter(p => !forbidden.has(p));
  return allowed[Math.floor(Math.random() * allowed.length)] || pool[0];
}

function findMatches(grid) {
  const matched = new Set();
  const rows = grid.length;
  const cols = grid[0].length;

  // 가로
  for (let r = 0; r < rows; r++) {
    let runStart = 0;
    for (let c = 1; c <= cols; c++) {
      const cur = (c < cols) ? grid[r][c] : null;
      const startVal = grid[r][runStart];
      const same = (c < cols && cur && cur === startVal);
      if (!same) {
        if (c - runStart >= 3 && startVal != null) {
          for (let cc = runStart; cc < c; cc++) matched.add(`${r},${cc}`);
        }
        runStart = c;
      }
    }
  }

  // 세로
  for (let c = 0; c < cols; c++) {
    let runStart = 0;
    for (let r = 1; r <= rows; r++) {
      const cur = (r < rows) ? grid[r][c] : null;
      const startVal = grid[runStart][c];
      const same = (r < rows && cur && cur === startVal);
      if (!same) {
        if (r - runStart >= 3 && startVal != null) {
          for (let rr = runStart; rr < r; rr++) matched.add(`${rr},${c}`);
        }
        runStart = r;
      }
    }
  }

  return [...matched].map(k => {
    const [r, c] = k.split(',').map(Number);
    return { r, c };
  });
}

function applyGravity(grid) {
  const rows = grid.length, cols = grid[0].length;
  for (let c = 0; c < cols; c++) {
    let writeRow = rows - 1;
    for (let r = rows - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        if (writeRow !== r) {
          grid[writeRow][c] = grid[r][c];
          grid[r][c] = null;
        }
        writeRow--;
      }
    }
  }
}

function refillGrid(grid, cfg) {
  const pool = [...cfg.dangers, ...cfg.safes];
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[0].length; c++) {
      if (grid[r][c] === null) {
        grid[r][c] = pool[Math.floor(Math.random() * pool.length)];
      }
    }
  }
}

// 실시간 선착순 카운터 (match3 용)
function updateMatch3Progress() {
  const nEl = document.getElementById('m3ProgressN');
  if (!nEl) return;
  const count = Object.values(currentInputs).filter(i => i?.input?.eliminated).length;
  const needed = currentState?.payload?.winners_needed ?? 3;
  nEl.textContent = count;
  const wrap = document.getElementById('m3Progress');
  if (wrap) wrap.classList.toggle('full', count >= needed);
}

// ════════════════════════════════════════════════════════════
// logic_break — 6-3 머리방 게임 (3라운드 논리 파괴)
// ────────────────────────────────────────────────────────────
//   진행자가 라운드마다 firebase 상태 갱신 → audience 는 새 라운드마다 버튼 표시
//   phase: 'collecting' 동안 투표 가능, 'reveal' 일 때 결과 표시, 'success' 면 끝
// ════════════════════════════════════════════════════════════
function renderLogicBreakGame(state) {
  const p = state.payload || {};

  // 모든 라운드 완료 — 성공 화면
  if (state.phase === 'success') {
    document.getElementById('body').innerHTML = `
      <div class="scene lb-scene">
        <div class="lb-banner-success">💥 시스템 다운!<br>컴퓨터 논리 파괴 성공</div>
      </div>
    `;
    stopTimer();
    return;
  }

  const isReveal = state.phase === 'reveal';
  const winnerOpt = state.winner_option;
  const correctOpt = state.correct_option;
  const wasCorrect = state.was_correct;
  const showRetryHint = isReveal && wasCorrect === false;

  const descItems = (p.description?.items || []).map(it => `<li>${escapeHtml(it)}</li>`).join('');
  const timerHtml = state.duration > 0 && !isReveal
    ? `<div class="timer-pill" id="timer">⏱ <b>--</b>초 남음</div>` : '';

  const optsHtml = (p.options || []).map((opt, idx) => {
    const letter = String.fromCharCode(65 + idx);
    const isWinner = isReveal && opt === winnerOpt;
    const isCorrectAns = isReveal && correctOpt && opt === correctOpt;
    let cls = '';
    if (isWinner && wasCorrect) cls = 'lb-btn-winner';
    else if (isWinner && wasCorrect === false) cls = 'lb-btn-failed';
    else if (!isWinner && isCorrectAns) cls = 'lb-btn-correct-hint';
    return `
      <button class="lb-btn ${cls}" data-opt="${escapeHtml(opt)}" ${submitted || isReveal ? 'disabled' : ''}>
        <span class="lb-btn-letter">${letter})</span>
        <span class="lb-btn-text">${escapeHtml(opt)}</span>
      </button>`;
  }).join('');

  const attemptLabel = (p.attempt && p.attempt > 1)
    ? ` · 재시도 ${p.attempt - 1}회`
    : '';

  document.getElementById('body').innerHTML = `
    <div class="scene lb-scene">
      <div class="lb-quest">${escapeHtml(p.quest_title || '논리 파괴')}</div>
      ${timerHtml}
      <div class="lb-round-pill">ROUND ${p.current_round || 1} / ${p.total_rounds || 3}${attemptLabel}</div>
      <div class="lb-desc">
        <div class="lb-desc-title">${escapeHtml(p.description?.title || '[FILE]')}</div>
        <ul class="lb-desc-items">${descItems}</ul>
      </div>
      <div class="lb-question">${escapeHtml(p.question || '선택지')}</div>
      <div class="lb-opts">${optsHtml}</div>
      ${showRetryHint ? `<div class="lb-retry-note">✗ 시스템이 거부했어요 — 다시 시도!</div>` : ''}
      ${submitted && !isReveal ? `<div class="lb-submitted-note">✓ 투표 완료 · 결과 공개 대기 중</div>` : ''}
    </div>
  `;

  // 버튼 핸들러
  if (!submitted && !isReveal) {
    document.querySelectorAll('.lb-btn').forEach(b => {
      b.onclick = () => {
        const opt = b.dataset.opt;
        if (!opt || submitted) return;
        submitted = true;
        set(ref(db, `inputs/${currentSceneId}/${user.user_id}`), {
          timestamp: serverNow(),
          nickname: user.nickname,
          input: { choice: opt }
        }).catch(err => console.warn('logic_break submit failed', err));
        // 버튼 비활성화 + 선택한 거 강조
        document.querySelectorAll('.lb-btn').forEach(btn => {
          btn.disabled = true;
          if (btn.dataset.opt === opt) btn.classList.add('lb-btn-mine');
        });
        // submitted 안내 표시
        const scene = document.querySelector('.lb-scene');
        if (scene && !scene.querySelector('.lb-submitted-note')) {
          const note = document.createElement('div');
          note.className = 'lb-submitted-note';
          note.textContent = '✓ 투표 완료 · 결과 공개 대기 중';
          scene.appendChild(note);
        }
      };
    });
  }

  if (state.duration > 0 && !isReveal) startTimerLoop(state);
  else stopTimer();
}

function renderSubmitted(answerLabel) {
  document.getElementById('body').innerHTML = `
    <div class="submitted">
      <div class="check">✓</div>
      <h3>제출 완료</h3>
      <p>잠시만 기다려 주세요</p>
      ${answerLabel ? `<div class="my-answer">내 응답: <b>${escapeHtml(answerLabel)}</b></div>` : ''}
    </div>
  `;
  stopTimer();
}

// ════════════════════════════════════════════════════════════
// 입력 제출
// ════════════════════════════════════════════════════════════
function submitInput(payload, label) {
  if (submitted || !currentSceneId) return;
  submitted = true;
  renderSubmitted(label);
  set(ref(db, `inputs/${currentSceneId}/${user.user_id}`), {
    timestamp: Date.now(),
    nickname: user.nickname,
    input: payload
  }).catch(err => console.warn('submit failed', err));
}
function submitChoice(opt) {
  if (!currentSceneId || !user) return;
  // 이미 잠겼거나 reveal 단계면 무시
  if (submitted || currentState?.phase === 'reveal') return;

  // Firebase 에 덮어쓰기 (user_id 키라서 자동 last-write-wins)
  set(ref(db, `inputs/${currentSceneId}/${user.user_id}`), {
    timestamp: Date.now(),
    nickname: user.nickname,
    input: { choice: opt }
  }).catch(err => console.warn('submit failed', err));

  // 시각적으로 선택 표시
  updateChoiceSelection(opt);
}

// 선택 버튼 시각적 갱신 (DOM 만 업데이트, 전체 재렌더 안 함)
function updateChoiceSelection(opt) {
  document.querySelectorAll('.choice-btn, .ox-btn').forEach(btn => {
    btn.classList.remove('selected');
  });
  if (currentState?.type === 'ox') {
    document.querySelector(`.ox-btn[data-ox="${opt}"]`)?.classList.add('selected');
  } else {
    document.querySelectorAll('.choice-btn').forEach(btn => {
      try {
        if (JSON.parse(btn.dataset.opt) === opt) btn.classList.add('selected');
      } catch(e) {}
    });
  }
  const hint = document.getElementById('selectionHint');
  if (hint) {
    hint.textContent = `✓ 현재 선택: ${opt} · 다시 탭하면 변경됨`;
    hint.classList.add('has-selection');
  }
}

function submitQTE() { submitInput({ tapped_at: Date.now() }, '✓ 반응'); }
function submitText() {
  const v = document.getElementById('textInput').value.trim();
  if (!v) return;
  submitInput({ text: v }, v);
}

// burst 의 매 탭마다 Firebase 에 즉시 동기화 (80ms throttle)
// → 메인 화면 카운터가 실시간으로 차오름
let burstWriteTimer = null;
let burstWritePending = false;
function scheduleBurstWrite() {
  burstWritePending = true;
  if (burstWriteTimer) return;
  burstWriteTimer = setTimeout(() => {
    burstWriteTimer = null;
    if (!burstWritePending) return;
    burstWritePending = false;
    if (!currentSceneId || !user || submitted) return;
    set(ref(db, `inputs/${currentSceneId}/${user.user_id}`), {
      timestamp: Date.now(),
      nickname: user.nickname,
      input: { count: burstCount }
    }).catch(err => console.warn('burst write failed', err));
  }, 80);
}

function tickBurst() {
  if (submitted) return;
  // 1인당 한도 (payload.tap_target_per_user) 도달 시 더 안 셈
  const cap = currentState?.payload?.tap_target_per_user;
  if (cap && burstCount >= cap) return;

  burstCount++;
  const el = document.getElementById('burstCount');
  if (el) {
    el.textContent = burstCount;
    el.style.transform = 'scale(1.1)';
    requestAnimationFrame(() => el.style.transform = 'scale(1)');
  }
  // 한도에 도달했으면 버튼 비활성화
  if (cap && burstCount >= cap) {
    const btn = document.getElementById('burstBtn');
    if (btn) {
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.textContent = `한도 도달 (${cap})`;
    }
  }
  // Firebase 에 throttled write → 메인 카운터가 실시간 반영
  scheduleBurstWrite();
}

// ════════════════════════════════════════════════════════════
// 타이머
// ════════════════════════════════════════════════════════════
function startTimerLoop(state) {
  stopTimer();
  if (state.duration === 0) return;
  const update = () => {
    const remaining = Math.max(0, state.started_at + state.duration - serverNow());
    const el = document.getElementById('timer');
    if (!el) return;
    el.querySelector('b').textContent = (remaining/1000).toFixed(1);
    if (remaining < 3000) el.classList.add('warning'); else el.classList.remove('warning');
    if (remaining <= 0) {
      if (state.type === 'choice' || state.type === 'ox') {
        // 선택지/OX: 마지막 선택 확정 잠금
        document.querySelectorAll('.choice-btn, .ox-btn').forEach(b => b.classList.add('locked'));
        const hint = document.getElementById('selectionHint');
        if (hint) {
          const mine = user ? currentInputs[user.user_id]?.input?.choice : null;
          hint.textContent = mine ? `🔒 최종 확정: ${mine}` : '🔒 시간 종료 (선택 없음)';
          hint.classList.remove('has-selection');
          hint.classList.add('locked');
        }
      } else if (!submitted && state.type !== 'qte_burst') {
        document.querySelectorAll('button, input').forEach(b => b.disabled = true);
      }
      return;
    }
    timerId = requestAnimationFrame(update);
  };
  timerId = requestAnimationFrame(update);
}
function stopTimer() { if (timerId) { cancelAnimationFrame(timerId); timerId = null; } }
function serverNow() { return Date.now() + serverOffset; }

// ════════════════════════════════════════════════════════════
// 상태 구독
// ════════════════════════════════════════════════════════════
function subscribeToState() {
  renderWaiting();
  if (stateUnsubscribe) stateUnsubscribe();
  stateUnsubscribe = onValue(ref(db, 'gameState'), (snap) => {
    const state = snap.val() || {
      scene_id: '', type: 'idle', phase: 'idle', duration: 0, started_at: 0
    };

    const sceneChanged = state.scene_id !== currentSceneId;
    const wasRevealing = currentState?.phase === 'reveal';

    if (sceneChanged) {
      currentSceneId = state.scene_id;
      submitted = false;
      burstCount = 0;
      currentInputs = {};
      if (burstAutoSubmitId) { clearTimeout(burstAutoSubmitId); burstAutoSubmitId = null; }
      if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }

      // 새 씬에 대한 inputs 구독 시작 — 결과 공개 시 실시간 갱신용
      if (state.scene_id) {
        inputsUnsubscribe = onValue(ref(db, `inputs/${state.scene_id}`), (s) => {
          currentInputs = s.val() || {};
          // 이미 reveal 단계면 결과 다시 그리기
          if (currentState?.phase === 'reveal') {
            renderRevealResults(currentState, currentInputs);
          }
          // map_align / match3 진행 중이면 선착순 카운터 실시간 업데이트
          if (currentState?.phase === 'collecting') {
            if (currentState?.type === 'map_align') updateMapAlignProgress();
            if (currentState?.type === 'match3')    updateMatch3Progress();
          }
        });
      }
    }

    currentState = state;

    // 화면 분기
    if (!state.scene_id || state.type === 'idle' || state.phase === 'idle') {
      if (sceneChanged) renderWaiting();
    } else if (state.phase === 'reveal') {
      // reveal 진입 시(또는 이미 reveal 인데 씬 바뀐 경우) 결과 화면
      renderRevealResults(state, currentInputs);
    } else if (sceneChanged) {
      // collecting 단계 — 입력 UI
      renderScene(state);
    } else if (wasRevealing && state.phase === 'collecting') {
      // reveal 에서 다시 collecting 으로 돌아온 희귀 케이스
      renderScene(state);
    }
  });
}

// ════════════════════════════════════════════════════════════
// 로그아웃
// ════════════════════════════════════════════════════════════
window.logout = function() {
  if (!confirm('로그아웃 할까요?')) return;
  if (user) remove(ref(db, `users/${user.user_id}`));
  localStorage.removeItem('audience_user');
  user = null;
  if (stateUnsubscribe) stateUnsubscribe();
  if (inputsUnsubscribe) inputsUnsubscribe();
  location.reload();
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ════════════════════════════════════════════════════════════
// 시작
// ════════════════════════════════════════════════════════════
if (user) {
  document.getElementById('userTagText').innerHTML = `👤 <b>${escapeHtml(user.nickname)}</b>`;
  document.getElementById('logoutBtn').style.display = 'inline-block';
  // 재접속 시 users 노드에도 다시 등록
  set(ref(db, `users/${user.user_id}`), {
    nickname: user.nickname,
    joined_at: Date.now()
  });
  subscribeToState();
} else {
  renderJoin();
}
