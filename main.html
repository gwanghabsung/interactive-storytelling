<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>To save __</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+KR:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: rgba(21,21,28,0.85);
    --surface-2: rgba(31,31,40,0.9);
    --line: rgba(255,255,255,0.12);
    --text: #f5f5f7;
    --muted: #9999aa;
    --accent: #ffd60a;
    --danger: #ff3d71;
    --success: #00d68f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'Bricolage Grotesque', sans-serif;
    overflow: hidden;
  }

  /* ── 영상 스테이지 (풀스크린) ── */
  .stage {
    position: fixed; inset: 0;
    background: #000;
  }
  .vid-layer {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .vid-layer.active { opacity: 1; }

  /* ── 오버레이 ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 60px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  /* 챕터 타이틀 모드 — 솔리드 검은 배경으로 이전 씬 완전히 가림 */
  .overlay.chapter-mode {
    background: radial-gradient(ellipse at center, rgba(15,15,20,0.97) 0%, rgba(0,0,0,0.99) 100%);
  }
  /* 게임 인트로 모드 — 살짝 어둡게 (영상 freeze 프레임이 은은하게 보임) */
  .overlay.intro-mode {
    background: rgba(0, 0, 0, 0.78);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .overlay-backdrop {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.85) 100%);
    z-index: 0;
  }

  .overlay-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    gap: 32px; max-width: 1200px; width: 100%;
  }

  .overlay-prompt {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    text-shadow: 0 4px 24px rgba(0,0,0,0.8);
  }

  .overlay-timer {
    font-family: 'Orbitron', 'JetBrains Mono', monospace;
    font-size: 80px; font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-shadow:
      0 0 12px rgba(255,214,10,0.85),
      0 0 28px rgba(255,214,10,0.5),
      0 0 56px rgba(255,214,10,0.25);
    transition: color 0.3s, text-shadow 0.3s;
  }
  .overlay-timer.warning {
    color: var(--danger);
    text-shadow:
      0 0 12px rgba(255,61,113,0.85),
      0 0 28px rgba(255,61,113,0.55),
      0 0 56px rgba(255,61,113,0.3);
    animation: shake 0.3s ease-in-out infinite;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  /* 결과 막대 */
  .results-grid {
    width: 100%; max-width: 900px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .res-row {
    display: grid; grid-template-columns: 320px 1fr 100px;
    gap: 20px; align-items: center;
  }
  .res-label {
    font-size: 24px; font-weight: 500; text-align: left;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .res-track {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border-radius: 8px; height: 44px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .res-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #ff8c00);
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .res-row.winner .res-fill {
    background: linear-gradient(90deg, var(--success), #00d68f);
    box-shadow: 0 0 24px rgba(0,214,143,0.4);
  }
  .res-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 700;
    text-align: right;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .status-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text);
    padding: 8px 16px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── 결말 화면 ── */
  .ending-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 60px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.7), #000 80%);
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }
  .ending-screen.show { opacity: 1; pointer-events: auto; }

  .ending-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .ending-title {
    font-size: clamp(56px, 8vw, 120px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0;
  }
  .ending-subtitle {
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 400;
    color: var(--muted);
    margin: 16px 0 32px;
  }
  .ending-description {
    font-size: 18px; line-height: 1.6;
    max-width: 600px;
    color: var(--text);
    opacity: 0.85;
    margin: 0 0 48px;
  }

  /* ── 시작 화면 ── */
  .start-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 60px;
    background: radial-gradient(ellipse at center, #15151c, #000 80%);
    z-index: 10;
    transition: opacity 0.8s ease;
  }
  .start-screen.hide { opacity: 0; pointer-events: none; }
  .start-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .start-title {
    font-size: clamp(48px, 8vw, 140px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 0.95;
    margin: 0 0 24px;
  }
  .start-info {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 48px;
    font-family: 'JetBrains Mono', monospace;
  }
  .start-info b { color: var(--text); }

  .big-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 20px 64px;
    font-family: inherit;
    font-size: 20px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 40px rgba(255,214,10,0.3);
  }
  .big-btn:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(255,214,10,0.5); }
  .big-btn:active { transform: scale(0.98); }
  .big-btn.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line);
    box-shadow: none;
  }
  .big-btn.ghost:hover { background: rgba(255,255,255,0.05); }

  /* 작은 보조 버튼 — 폴더 선택, 접속자 초기화 등 */
  .small-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 8px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .small-btn:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text);
    border-color: rgba(255,255,255,0.3);
  }

  /* ── HUD (상단 미니 컨트롤) ── */
  .hud {
    position: fixed; top: 16px; right: 16px;
    display: flex; gap: 12px; align-items: center;
    z-index: 100;
  }
  .hud-pill {
    padding: 6px 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .hud-pill .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }
  .hud-pill .dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .hud-btn {
    padding: 6px 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hud-btn:hover { background: rgba(255,255,255,0.1); }

  /* ── 진행자 컨트롤 (영상 스킵 / 타이머 감축) ── */
  .dev-controls {
    position: fixed;
    bottom: 20px; right: 20px;
    display: none;
    gap: 6px;
    z-index: 100;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(10px);
    padding: 6px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  .dev-controls.active { display: flex; }
  .dev-controls:hover { opacity: 1; }
  .dev-btn {
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .dev-btn:hover { background: rgba(255,255,255,0.18); }
  .dev-btn:active { transform: scale(0.94); }
  .dev-btn.danger { color: var(--danger); border-color: rgba(255,61,113,0.4); }
  .dev-btn.danger:hover { background: rgba(255,61,113,0.15); }

  /* ── QTE BURST (탭핑 연타) ── */
  /* 배터리 박스: 네모칸 안에 큰 숫자, 아래에서 위로 차오름 */
  .qte-battery {
    position: relative;
    width: clamp(360px, 42vw, 560px);
    height: clamp(220px, 28vw, 360px);
    border: 4px solid var(--accent);
    border-radius: 18px;
    background: rgba(0,0,0,0.7);
    overflow: hidden;
    box-shadow:
      0 0 48px rgba(255,214,10,0.35),
      inset 0 0 24px rgba(255,214,10,0.18);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  /* 사이버 그리드 배경 */
  .qte-battery::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,214,10,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,214,10,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 1;
    pointer-events: none;
  }
  .qte-battery-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    background: linear-gradient(180deg,
      rgba(255,214,10,0.55) 0%,
      rgba(255,140,0,0.85) 60%,
      rgba(255,100,0,0.95) 100%);
    box-shadow: 0 -2px 16px rgba(255,214,10,0.5);
    transition: height 80ms linear;
    z-index: 2;
  }
  /* 차오르는 표면에 옅은 wave 효과 */
  .qte-battery-fill::after {
    content: '';
    position: absolute;
    top: -3px; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.6), transparent);
  }
  .qte-battery-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: clamp(120px, 18vw, 220px);
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 16px rgba(0,0,0,0.95),
      0 4px 16px rgba(0,0,0,0.95),
      0 0 32px rgba(255,214,10,0.4);
    letter-spacing: -0.02em;
    line-height: 1;
    z-index: 3;
    transition: transform 0.08s;
  }
  .qte-battery-num.bump { transform: scale(1.12); }
  .qte-battery.done {
    border-color: var(--success);
    box-shadow:
      0 0 64px rgba(0,214,143,0.6),
      inset 0 0 32px rgba(0,214,143,0.28);
  }
  .qte-battery.done .qte-battery-fill {
    background: linear-gradient(180deg,
      rgba(0,214,143,0.7) 0%,
      rgba(0,180,120,0.9) 60%,
      rgba(0,150,100,0.98) 100%);
    box-shadow: 0 -2px 16px rgba(0,214,143,0.6);
    height: 100%;
  }
  .qte-battery.done .qte-battery-num {
    text-shadow:
      0 0 16px rgba(0,0,0,0.95),
      0 4px 16px rgba(0,0,0,0.95),
      0 0 32px rgba(0,214,143,0.5);
  }
  .qte-goal-label {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: -8px;
  }
  /* 마구잡이로 떠다니는 닉네임 (overlay-content 기준 absolute) */
  .qte-names {
    position: absolute;
    inset: -60px;
    pointer-events: none;
    z-index: 0;
  }
  .qte-name {
    position: absolute;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.6);
    animation: qte-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: rgba(255,255,255,0.92);
  }
  .qte-name .cnt {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-left: 6px;
    font-weight: 700;
  }
  @keyframes qte-pop {
    0%   { transform: scale(1.5); opacity: 0.4; }
    60%  { transform: scale(0.94); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── SUCCESS / FAIL 큰 패널 (탭 결과 발표) ── */
  .success-fail-panel {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(80px, 14vw, 220px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    animation: sf-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .success-fail-panel.success-color {
    color: var(--success);
    text-shadow: 0 0 80px rgba(0,214,143,0.55), 0 6px 28px rgba(0,0,0,0.95);
  }
  .success-fail-panel.fail-color {
    color: var(--danger);
    text-shadow: 0 0 80px rgba(255,61,113,0.5), 0 6px 28px rgba(0,0,0,0.95);
  }
  .success-fail-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 700;
    color: var(--text);
    margin-top: 16px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.9);
  }
  .success-fail-sub .goal { color: var(--muted); font-size: 0.7em; }
  @keyframes sf-pop {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── 엔딩 크레딧 (영화 스타일 위로 스크롤) ── */
  .credits-screen {
    position: fixed; inset: 0;
    background: #000;
    z-index: 60;
    overflow: hidden;
    display: none;
  }
  .credits-screen.show { display: block; }
  .credits-roll {
    position: absolute;
    left: 50%;
    transform: translate(-50%, 0);
    top: 100vh;                 /* 시작 위치: 화면 아래 */
    width: 90%; max-width: 720px;
    text-align: center;
    color: #f5f5f7;
    padding-bottom: 60vh;
    animation-name: credits-scroll;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    /* animation-duration 은 JS 에서 inline 으로 지정 */
  }
  @keyframes credits-scroll {
    0%   { top: 100vh; }
    100% { top: -100%; }
  }
  .credits-roll h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(60px, 9vw, 120px);
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--accent);
    margin: 0 0 16px 0;
  }
  .credits-roll .subtitle {
    font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 120px;
  }
  .credits-roll section {
    margin-bottom: 100px;
  }
  .credits-roll h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .credits-roll .row {
    font-size: clamp(20px, 2.2vw, 28px);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .credits-roll .row .cnt {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-left: 14px;
    font-weight: 700;
  }
  .credits-roll .row .mission-rank {
    display: inline-block;
    margin-right: 12px;
    font-size: 0.9em;
  }
  .credits-roll .big-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(60px, 10vw, 120px);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .credits-roll .closing {
    font-size: clamp(22px, 2.6vw, 32px);
    font-weight: 500;
    line-height: 1.6;
    margin-top: 60px;
    white-space: pre-line;
  }
  /* 수강생 메시지 — 이름 + 한 줄 후기 */
  .credits-roll .message {
    margin-bottom: 38px;
    text-align: left;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
  .credits-roll .message .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(15px, 1.4vw, 18px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .credits-roll .message .text {
    font-size: clamp(19px, 2vw, 26px);
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255,255,255,0.92);
  }
  .credits-roll .message-teacher .name { color: var(--success); }
  .credits-restart {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 61;
    opacity: 0;
    transition: opacity 0.6s;
    pointer-events: none;
  }
  .credits-restart.show { opacity: 1; pointer-events: auto; }

  /* ── GAME OVER 화면 ── */
  .gameover-screen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.93);
    backdrop-filter: blur(10px);
    z-index: 70;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  .gameover-screen.show {
    display: flex;
    animation: gameover-flash 0.4s ease-out;
  }
  .gameover-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(80px, 14vw, 220px);
    font-weight: 900;
    color: var(--danger);

<script type="module">

// ════════════════════════════════════════════════════════════
// Firebase 설정 — 본인 firebaseConfig 객체로 교체
// ════════════════════════════════════════════════════════════
const firebaseConfig = {

};

const db = getDatabase(app);
const stateRef = ref(db, 'gameState');
const usersRef = ref(db, 'users');

// ════════════════════════════════════════════════════════════
// 서버 시각 동기화 — 진행자 노트북 시계와 청중 폰 시계 차이로 인한
//   타이머 불일치를 막기 위해 main 도 서버 시각 기준으로 started_at 을 씀.
//   (index.html 도 동일하게 .info/serverTimeOffset 사용 → 양쪽 같은 기준점)
// ════════════════════════════════════════════════════════════
let mainServerOffset = 0;
onValue(ref(db, '.info/serverTimeOffset'), (snap) => {
  mainServerOffset = snap.val() || 0;
});
function serverNow() { return Date.now() + mainServerOffset; }

// 씬 정의 (scenes.js 에서 로드)
const SCENES = window.SCENES;
const START_SCENE = window.START_SCENE || 'start';

// ════════════════════════════════════════════════════════════
// 로컬 영상 매핑 (File API)
// 발표자가 자기 노트북 폴더를 선택하면 그 안의 영상들을 blob URL 로 매핑.
// scenes.js 의 'videos/example.mp4' 같은 경로는 파일명으로 매칭됨.
// ════════════════════════════════════════════════════════════
const localVideos = {};   // { 'example.mp4': blob_url, ... }

document.getElementById('loadVideosBtn').onclick = () => {
  document.getElementById('folderInput').click();
};

document.getElementById('folderInput').onchange = (e) => {
  const files = Array.from(e.target.files || []);
  let loadedCount = 0;
  for (const file of files) {
    // 영상 파일만 (확장자 또는 MIME 검사)
    if (file.type.startsWith('video/') || /\.(mp4|webm|mov|m4v|ogv)$/i.test(file.name)) {
      // 같은 이름이 여러 폴더에 있으면 마지막 것이 이김 (보통 문제 없음)
      localVideos[file.name] = URL.createObjectURL(file);
      loadedCount++;
    }
  }
  const status = document.getElementById('videoStatus');
  if (loadedCount > 0) {
    const fileList = Object.keys(localVideos).slice(0, 5).join(', ');
    const more = Object.keys(localVideos).length > 5 ? ` 외 ${Object.keys(localVideos).length - 5}개` : '';
    status.innerHTML = `✓ <span style="color:var(--success)">${loadedCount}개 영상 로드됨</span> · ${fileList}${more}`;
  } else {
    status.innerHTML = `<span style="color:var(--danger)">⚠ 영상 파일이 없어요. 다시 선택해주세요.</span>`;
  }
};

function resolveVideoSrc(src) {
  if (!src) return src;
  // 외부 URL 이면 그대로 사용
  if (/^(https?:|blob:)/.test(src)) return src;
  // 로컬 매핑에 파일명이 있으면 blob URL 로 치환
  const filename = src.split('/').pop();
  if (localVideos[filename]) return localVideos[filename];
  // 폴백: 상대경로 그대로 (영상이 같은 서버에 있는 경우)
  return src;
}

// ════════════════════════════════════════════════════════════
// BGM 시스템 — 영상과 별개로 흐르는 배경음악
// ────────────────────────────────────────────────────────────
//   - bgm/ 폴더의 mp3 파일들을 진행자가 게임 시작 전 한 번 로드
//   - scenes.js 의 씬에 `bgm: 'filename.mp3'` 필드가 있으면 그 씬부터 그 BGM 재생
//   - `bgm` 필드가 없으면 이전 BGM 유지 (선택지/게임/씬 전환에서 자연스럽게 이어짐)
//   - `bgm: null` 이면 BGM 페이드아웃 (정지)
//   - 같은 BGM 연속이면 아무것도 안 함 (끊김 없음)
//   - 다른 BGM 으로 바뀌면 cross-fade (aA ↔ aB 두 엘리먼트 사용)
//   - 옵션 필드: `bgm_volume` (0~1, 기본 0.5), `bgm_fade_ms` (기본 800)
// ════════════════════════════════════════════════════════════
const localBgms = {};   // { 'opening.mp3': blob_url, ... }

document.getElementById('loadBgmsBtn').onclick = () => {
  document.getElementById('bgmFolderInput').click();
};

document.getElementById('bgmFolderInput').onchange = (e) => {
  const files = Array.from(e.target.files || []);
  let loadedCount = 0;
  for (const file of files) {
    // 오디오 파일만 (확장자 또는 MIME 검사)
    if (file.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a|aac|flac)$/i.test(file.name)) {
      localBgms[file.name] = URL.createObjectURL(file);
      loadedCount++;
    }
  }
  const status = document.getElementById('bgmStatus');
  if (loadedCount > 0) {
    const fileList = Object.keys(localBgms).slice(0, 5).join(', ');
    const more = Object.keys(localBgms).length > 5 ? ` 외 ${Object.keys(localBgms).length - 5}개` : '';
    status.innerHTML = `✓ <span style="color:var(--success)">${loadedCount}개 BGM 로드됨</span> · ${fileList}${more}`;
  } else {
    status.innerHTML = `<span style="color:var(--danger)">⚠ 오디오 파일이 없어요. 다시 선택해주세요.</span>`;
  }
};

function resolveBgmSrc(src) {
  if (!src) return src;
  if (/^(https?:|blob:)/.test(src)) return src;
  const filename = src.split('/').pop();
  if (localBgms[filename]) return localBgms[filename];
  return src;
}

// BGM 오디오 엘리먼트 (cross-fade 용)
const aA = document.getElementById('aA');
const aB = document.getElementById('aB');
let activeBgm = aA, standbyBgm = aB;
let currentBgmFile = null;     // 현재 재생 중인 파일명 (path 가 아니라 파일명만)
let currentBgmVolume = 0.5;    // 현재 BGM 목표 볼륨

// fade helper — duration 동안 from→to 로 볼륨 보간
function fadeAudio(audio, from, to, duration) {
  if (duration <= 0) {
    audio.volume = Math.max(0, Math.min(1, to));
    return Promise.resolve();
  }
  return new Promise(resolve => {
    const start = performance.now();
    audio.volume = Math.max(0, Math.min(1, from));
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      audio.volume = Math.max(0, Math.min(1, from + (to - from) * t));
      if (t < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

// BGM 재생/변경/정지 — playScene 진입 시 호출됨
//   src: 'filename.mp3' (또는 null = 정지)
//   volume: 0~1 (기본 0.5)
//   fadeMs: cross-fade 시간 (기본 800)
async function playBgm(src, volume, fadeMs) {
  const targetVolume = (volume !== undefined && volume !== null) ? volume : 0.5;
  const fade = (fadeMs !== undefined && fadeMs !== null) ? fadeMs : 800;
  const targetFile = src ? src.split('/').pop() : null;

  // 같은 BGM 이 이미 재생 중이면 볼륨만 맞추고 끝
  if (targetFile === currentBgmFile) {
    if (targetFile && activeBgm.volume !== targetVolume) {
      fadeAudio(activeBgm, activeBgm.volume, targetVolume, fade);
      currentBgmVolume = targetVolume;
    }
    return;
  }

  // null 이면 정지 (현재 BGM 페이드아웃)
  if (!targetFile) {
    const old = activeBgm;
    const oldVol = old.volume;
    currentBgmFile = null;
    await fadeAudio(old, oldVol, 0, fade);
    old.pause();
    return;
  }

  // 새 BGM — standby 에 로드 → 동시에 active 페이드아웃 + standby 페이드인
  const resolved = resolveBgmSrc(src);
  standbyBgm.src = resolved;
  standbyBgm.loop = true;
  standbyBgm.volume = 0;
  try {
    standbyBgm.load();
    // play() 는 자동 재생 정책 때문에 첫 사용자 클릭 후에야 통과됨 (startBtn 클릭이 그 트리거)
    await standbyBgm.play();
  } catch (err) {
    console.warn('BGM play 실패 (자동재생 정책일 수 있음):', err);
    // 실패해도 재생 시도는 했으니 상태는 업데이트
  }

  const oldActive = activeBgm;
  const oldVol = oldActive.volume;

  // cross-fade
  await Promise.all([
    fadeAudio(oldActive, oldVol, 0, fade),
    fadeAudio(standbyBgm, 0, targetVolume, fade)
  ]);
  oldActive.pause();
  oldActive.src = '';

  // 슬롯 스왑
  [activeBgm, standbyBgm] = [standbyBgm, activeBgm];
  currentBgmFile = targetFile;
  currentBgmVolume = targetVolume;
}

// ════════════════════════════════════════════════════════════
// 비디오 플레이어 — 이중 버퍼
// ════════════════════════════════════════════════════════════
const vA = document.getElementById('vA');
const vB = document.getElementById('vB');
let activeVideo = vA, standbyVideo = vB;
let presenterPaused = false;  // 진행자가 수동 일시정지 했는지 추적 (자동 freeze 와 구분)

function swapVideos() {
  activeVideo.classList.remove('active');
  standbyVideo.classList.add('active');
  [activeVideo, standbyVideo] = [standbyVideo, activeVideo];
}

// 영상을 standby 슬롯에 로드 후 활성화 (예열 효과)
async function loadIntoStandby(src) {
  const resolved = resolveVideoSrc(src);
  standbyVideo.src = resolved;
  standbyVideo.load();
  await new Promise((resolve, reject) => {
    const onReady = () => { cleanup(); resolve(); };
    const onError = (e) => { cleanup(); reject(e); };
    const cleanup = () => {
      standbyVideo.removeEventListener('canplaythrough', onReady);
      standbyVideo.removeEventListener('error', onError);
    };
    standbyVideo.addEventListener('canplaythrough', onReady, { once: true });
    standbyVideo.addEventListener('error', onError, { once: true });
    // 안전장치: 5초 이내 canplaythrough 안 와도 진행
    setTimeout(resolve, 5000);
  });
}

// 영상을 재생하며 특정 시점(freezeAt)에서 슬로우 + 정지
function playUntilFreeze(video, freezeAt, slowDuration) {
  return new Promise(async (resolve) => {
    video.playbackRate = 1.0;
    video.muted = false;
    try { await video.play(); } catch(e) { video.muted = true; await video.play(); }

    const monitor = () => {
      // ended 만 종료 트리거 — paused 는 진행자가 수동 정지했을 수도 있으니 무시
      // (수동 정지 시엔 currentTime 이 멈추므로 monitor 가 그냥 폴링만 계속함 → resume 하면 다시 동작)
      if (video.ended) { resolve(); return; }
      const remaining = freezeAt - video.currentTime;

      if (remaining <= slowDuration) {
        // 슬로우 모션 — 선형 감속
        const progress = Math.max(0, 1 - (remaining / slowDuration));
        video.playbackRate = Math.max(0.08, 1 - progress * 0.92);
      }

      if (remaining <= 0.05) {
        video.pause();
        video.currentTime = freezeAt;
        video.playbackRate = 1.0;
        resolve();
        return;
      }
      requestAnimationFrame(monitor);
    };
    requestAnimationFrame(monitor);
  });
}

// 영상 끝까지 그냥 재생
function playToEnd(video) {
  return new Promise(async (resolve) => {
    video.playbackRate = 1.0;
    try { await video.play(); } catch(e) { video.muted = true; await video.play(); }
    video.addEventListener('ended', () => resolve(), { once: true });
  });
}

// ════════════════════════════════════════════════════════════
// 오버레이 UI (메인 스크린에서의 선택지 표시)
// ════════════════════════════════════════════════════════════
const overlay = document.getElementById('overlay');
const overlayContent = document.getElementById('overlayContent');
let currentInputs = {};
let overlayTimerId = null;
let currentOverlayState = null;

// 스토리 분기용 — 각 선택 씬의 결과(winner)를 기록 → 이후 branch 씬에서 참조
// 예: choicesHistory['s06_1_decision'] = '구하러 간다'
let choicesHistory = {};

function showOverlay(scene_id, overlayDef, startedAt) {
  // startedAt 은 Firebase 에 쓴 그 값(서버 시각)을 그대로 받아서
  //   메인 로컬 타이머도 청중 폰과 정확히 동일 시점에 종료되게 정렬.
  //   넘기지 않으면 안전하게 현재 서버 시각으로 폴백.
  if (!startedAt) startedAt = serverNow();
  currentOverlayState = { scene_id, overlay: overlayDef, started_at: startedAt };
  prevQteTotal = 0;  // 새 씬 시작 시 펄스 추적값 초기화
  renderOverlay(overlayDef.options || [], {}, overlayDef);
  overlay.classList.add('show');
  startOverlayTimer(overlayDef.duration || 10000, startedAt);
}

function hideOverlay() {
  overlay.classList.remove('show', 'chapter-mode', 'intro-mode');
  currentOverlayState = null;
  qteShellSceneId = null;   // 다음 씬에서 셸 새로 빌드되도록
  stopOverlayTimer();
}

function renderOverlay(options, tally, overlayDef, showWinner = false) {
  // 탭핑 연타는 옵션 막대가 아니라 카운터 + 떠다니는 닉네임으로 표시
  if (overlayDef.type === 'qte_burst') {
    renderQteBurst(tally, overlayDef, showWinner);
    return;
  }

  // manual: 진행자가 직접 "다음 진행" 버튼 눌러서 진행
  if (overlayDef.type === 'manual') {
    overlayContent.innerHTML = `
      <style>
        .ma-manual-wrap { display: flex; flex-direction: column; align-items: center; gap: 28px; margin-top: 24px; }
        .ma-manual-btn {
          padding: 22px 44px; border-radius: 999px;
          background: var(--accent); color: #0a0a0f; border: none;
          font-size: 22px; font-weight: 800; letter-spacing: -0.01em;
          font-family: inherit; cursor: pointer;
          box-shadow: 0 8px 32px rgba(255,214,10,0.4);
          transition: all 0.2s;
        }
        .ma-manual-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,214,10,0.55); }
        .ma-manual-btn:active { transform: translateY(0); }

// ── QTE BURST 전용 렌더 ──────────────────────────────────────
// tally: { nickname: count }
// 중앙에 큰 배터리 박스(현재 탭 수, 차오르는 fill), 양옆에 탭 많이 친 닉네임
// 매 입력마다 전체를 다시 그리지 않고 셸을 한 번만 빌드 → 카운터/이름만 직접 DOM 업데이트
let prevQteTotal = 0;
let qteShellSceneId = null;   // 현재 셸이 어느 씬용인지 추적

function renderQteBurst(tally, overlayDef, showWinner) {
  ensureQteBurstShell(overlayDef);
  updateQteBattery(tally, overlayDef);
  updateQteNames(tally);
}

function ensureQteBurstShell(overlayDef) {
  // 이미 동일 씬의 셸이 있으면 재사용 (실시간 업데이트 빠르게 하려고)
  const sceneKey = currentOverlayState?.scene_id || 'qte_burst';
  if (qteShellSceneId === sceneKey && document.getElementById('qteBattery')) return;
  qteShellSceneId = sceneKey;

  const goal = overlayDef.tap_target_total || 30;
  overlayContent.innerHTML = `
    <div class="qte-names" id="qteNames"></div>
    <div class="status-pill" id="qteStatus">투표 진행 중 · 0명 참여</div>
    <div class="overlay-prompt">${escapeHtml(overlayDef.prompt || '')}</div>
    <div class="overlay-timer" id="overlayTimer">--s</div>
    <div class="qte-battery" id="qteBattery">
      <div class="qte-battery-fill" id="qteFill"></div>
      <div class="qte-battery-num" id="qteNum">0</div>
    </div>
    <div class="qte-goal-label">목표 ${goal}</div>
  `;
  prevQteTotal = 0;
}

function updateQteBattery(tally, overlayDef) {
  const total = Object.values(tally).reduce((a, b) => a + (b || 0), 0);
  const goal = overlayDef.tap_target_total || 30;
  const pct = Math.min(100, (total / goal) * 100);
  const done = total >= goal;

  const num = document.getElementById('qteNum');
  const fill = document.getElementById('qteFill');
  const battery = document.getElementById('qteBattery');
  const status = document.getElementById('qteStatus');
  if (!num || !fill || !battery) return;

  num.textContent = total;
  fill.style.height = pct + '%';
  battery.classList.toggle('done', done);

  if (status) {
    const n = Object.entries(tally).filter(([, c]) => c > 0).length;
    status.textContent = `투표 진행 중 · ${n}명 참여`;
  }

  // 값이 늘 때마다 짧은 펄스 (animation restart)
  if (total > prevQteTotal) {
    num.classList.remove('bump');
    // 강제 reflow 후 다시 추가해야 animation 이 재시작됨
    // eslint-disable-next-line no-unused-expressions
    void num.offsetWidth;
    num.classList.add('bump');
    setTimeout(() => num.classList.remove('bump'), 90);
  }
  prevQteTotal = total;
}

function updateQteNames(tally) {
  const container = document.getElementById('qteNames');
  if (!container) return;

  const tappers = Object.entries(tally)
    .filter(([, c]) => c > 0)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 14);
  const maxCount = tappers[0]?.[1] || 1;

  container.innerHTML = tappers.map(([name, count]) => {
    const seed = strHash(name);
    const sideRand = (seed % 1000) / 1000;
    const xRand    = ((seed >> 3) % 1000) / 1000;
    const yRand    = ((seed >> 7) % 1000) / 1000;
    const rotRand  = ((seed >> 11) % 1000) / 1000;

    const side = sideRand < 0.5 ? 'left' : 'right';
    const x = side === 'left' ? (2 + xRand * 24) : (74 + xRand * 24);
    const y = 8 + yRand * 80;
    const rot = -8 + rotRand * 16;

    const sizeFactor = Math.sqrt(count / maxCount);
    const fontSize = 16 + 14 * sizeFactor;

    return `<div class="qte-name" style="left:${x}%; top:${y}%; font-size:${fontSize}px; transform: rotate(${rot}deg)">
      ${escapeHtml(name)}<span class="cnt">${count}</span>
    </div>`;
  }).join('');
}

// 닉네임 → 정수 해시 (위치 결정용)
function strHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h * 31) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// 7-3 qte_burst 의 최종 탭 통계 — 크레딧 씬에서 사용 ({ nickname: count })

// result_mode === 'success_fail' 일 때 outcome 산출
//   - qte_burst:        누적 탭 수 >= success_threshold
//   - map_align/match3: 성공 완료한 사람 수 >= success_threshold (또는 winners_needed)
//   - choice/qte/ox/text: 응답한 사람 수 >= success_threshold (기본 1)
function computeSuccessFail(overlayDef, tally, rawInputs) {
  const threshold = overlayDef.success_threshold ?? overlayDef.winners_needed ?? 1;
  let metric;
  if (overlayDef.type === 'qte_burst') {
    metric = Object.values(tally).reduce((a, b) => a + (b || 0), 0);
  } else if (overlayDef.type === 'map_align' || overlayDef.type === 'match3') {
    const successKey = overlayDef.type === 'match3' ? 'eliminated' : 'aligned';
    metric = Object.values(rawInputs || {}).filter(i => i?.input?.[successKey]).length;
  } else {
    metric = Object.keys(rawInputs || {}).length;
  }
  return metric >= threshold ? 'success' : 'fail';
}

// 큰 SUCCESS / FAIL 패널 — result_mode === 'success_fail' 의 reveal 단계 렌더
function renderSuccessFail(outcome, overlayDef, tally) {
  const isSuccess = outcome === 'success';
  const text = isSuccess
    ? (overlayDef.success_text || '✅ SUCCESS')

  let subText = '';

    const total = Object.values(tally).reduce((a, b) => a + (b || 0), 0);
    const goal = overlayDef.tap_target_total || overlayDef.success_threshold || 0;
    subText = `<div class="success-fail-sub">${total}<span class="goal"> / ${goal}</span></div>`;
  }

  overlayContent.innerHTML = `

// 외부에서 깎거나 즉시 종료할 수 있도록 모듈 변수로 보관
let overlayTimerStartedAt = 0;
let overlayTimerDurationMs = 0;
let overlayTimerResolvers = [];

function startOverlayTimer(durationMs, startedAt) {
  stopOverlayTimer();
  // 청중 폰의 remaining = state.started_at + state.duration - serverNow()
  //   메인도 동일 공식을 쓰도록 startedAt(=Firebase started_at, 서버시각) 기준.
  overlayTimerStartedAt = startedAt || serverNow();
  overlayTimerDurationMs = durationMs;
  const tick = () => {
    if (!currentOverlayState) return;
    const remaining = Math.max(0, overlayTimerStartedAt + overlayTimerDurationMs - serverNow());
    const el = document.getElementById('overlayTimer');
    if (el) {
      el.textContent = (remaining/1000).toFixed(1) + 's';
      if (remaining < 3000) el.classList.add('warning');
      else el.classList.remove('warning');
    }
    if (remaining > 0) {
      overlayTimerId = requestAnimationFrame(tick);
    } else {
      // 0 도달 → pendingShaveSync (마지막 shave 의 Firebase write) 끝난 뒤 깨우기
      //   강제종료(투표) 처럼 한 번에 0 이 되는 경우, 청중이 shave 결과(=0초) 를 보기 전에
      //   reveal phase 로 넘어가면 -5s 가 안 먹은 것처럼 보이므로 sync 까지 대기.
      const resolvers = overlayTimerResolvers;
      overlayTimerResolvers = [];
      pendingShaveSync.finally(() => resolvers.forEach(r => r()));
    }
  };
  overlayTimerId = requestAnimationFrame(tick);
}

// 오버레이 타이머가 0 이 될 때까지 대기 (sleep 대체용)
function waitForOverlayTimer() {
  const remaining = overlayTimerStartedAt + overlayTimerDurationMs - serverNow();
  if (remaining <= 0) return Promise.resolve();
  return new Promise(resolve => overlayTimerResolvers.push(resolve));
}

// 외부 호출용: 남은 시간 ms 만큼 깎기 (음수가 되면 다음 tick 에서 종료)
//   메인 로컬 타이머 + Firebase state 둘 다 깎아서 청중 폰에도 즉시 반영.
//   pendingShaveSync 를 통해 강제종료(투표 버튼) 같이 즉시 0 으로 만드는 경우에도
//   Firebase 동기화가 끝난 뒤 reveal 단계로 넘어가게 보장 → 청중이 단축 결과 못 보고 넘어가는 일 방지.
let pendingShaveSync = Promise.resolve();
function shaveOverlayTimer(ms) {
  if (!overlayTimerStartedAt) return;
  // 현재 남은 시간보다 더 깎으면 안 되므로 clamp.
  //   (overlayTimerDurationMs 는 started_at 기준 "총 길이" 이므로,
  //   "지금 시점부터 남은 ms" 를 깎는 의미가 되도록 동일하게 -ms 적용)
  overlayTimerDurationMs = Math.max(0, overlayTimerDurationMs - ms);
  // Firebase 의 duration = started_at 기준 새 총 길이.
  //   양쪽 모두 started_at + duration 시점에 종료되도록 동기화.
  const writeP = update(stateRef, { duration: overlayTimerDurationMs, updated_at: Date.now() })
    .catch(err => console.warn('shave duration sync failed', err));
  // 직전 sync 와 직렬화 (연달아 −5s 눌렀을 때 마지막 write 가 최종 상태로 가게)
  pendingShaveSync = pendingShaveSync.then(() => writeP);
}
function stopOverlayTimer() {
  if (overlayTimerId) { cancelAnimationFrame(overlayTimerId); overlayTimerId = null; }
  overlayTimerStartedAt = 0;
  overlayTimerDurationMs = 0;
  // 남아있는 대기자가 있으면 깨워서 풀어줌 (씬 강제 종료 시 안전장치)
  if (overlayTimerResolvers.length) {
    const rs = overlayTimerResolvers;
    overlayTimerResolvers = [];
    rs.forEach(r => r());
  }
}

    <div class="ending-eyebrow">― 결말 ―</div>
    <h1 class="ending-title" style="color:${scene.color || 'var(--accent)'}">${escapeHtml(scene.title || '결말')}</h1>
    <div class="ending-subtitle">${escapeHtml(scene.subtitle || '')}</div>
    <p class="ending-description">${escapeHtml(scene.description || '')}</p>
    <button class="big-btn ghost" onclick="window.restartGame()">다시 시작</button>
  `;
  endingScreen.classList.add('show');
  document.getElementById('restartBtn').style.display = 'block';
}
function hideEnding() {
  endingScreen.classList.remove('show');
}

// ════════════════════════════════════════════════════════════
// 게임 엔진
// ════════════════════════════════════════════════════════════
let inputsUnsubscribe = null;

async function playScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) {
    console.error('Unknown scene:', sceneId);
    return;
  }
  console.log('▶ Scene:', sceneId, scene);

  // BGM 처리: scene.bgm 이 명시적으로 정의되어 있을 때만 변경
  //   - 필드 없음 → 이전 BGM 그대로 유지 (자연스럽게 이어짐)
  //   - 'filename.mp3' → 그 BGM 으로 cross-fade
  //   - null → 페이드 아웃 (정지)
  //   - scene.bgm_delay_ms 가 있으면 그만큼 지연 후 재생 (예: 영상 시작 후 4초 뒤 BGM)
  if ('bgm' in scene) {
    const delayMs = scene.bgm_delay_ms || 0;
    if (delayMs > 0) {
      setTimeout(() => playBgm(scene.bgm, scene.bgm_volume, scene.bgm_fade_ms), delayMs);
    } else {
      // fire-and-forget — BGM 페이드를 기다리지 않고 영상은 즉시 진행
      playBgm(scene.bgm, scene.bgm_volume, scene.bgm_fade_ms);
    }
  }

  if (scene.type === 'video') {
    await runVideoScene(sceneId, scene);
  } else if (scene.type === 'ending') {
    await runEndingScene(scene);
  } else if (scene.type === 'credits') {
    await runCreditsScene(scene);
  } else if (scene.type === 'gameover') {
    await runGameOverScene(scene);
  } else if (scene.type === 'choice_only') {
    await runChoiceOnlyScene(sceneId, scene);
  } else if (scene.type === 'branch') {
    await runBranchScene(sceneId, scene);
  } else if (scene.type === 'chapter_title') {
    await runChapterTitleScene(sceneId, scene);
  } else if (scene.type === 'logic_break') {
    await runLogicBreakScene(sceneId, scene);
  }
}

// ════════════════════════════════════════════════════════════
// branch 씬 — 영상/오버레이 없이, 이전 선택에 따라 다음 씬으로 라우팅만
// ────────────────────────────────────────────────────────────
// 사용 예:
//   's08_3_branch': {
//     type: 'branch',
//     if_choice_from: 's06_1_decision',
//     next: {
//       '구하러 간다':         's08_3a',
//       '모른 척 한다':         's08_3a',
//       '조력자에게 도움 요청': 's08_3b',
//       default:               's08_3a'
//     }
//   }
// ════════════════════════════════════════════════════════════
async function runBranchScene(sceneId, scene) {
  const sourceSceneId = scene.if_choice_from;
  const recorded = sourceSceneId ? choicesHistory[sourceSceneId] : null;
  console.log('  Branch from', sourceSceneId, '→', recorded);

  // 매핑에 직접 일치 → 그 씬으로
  // 일치 안 함 또는 미기록 → default 로 폴백
  const nextId = (recorded && scene.next[recorded]) || scene.next.default;
  if (nextId) return playScene(nextId);
}

// ────────────────────────────────────────────────────────────
//   각 라운드마다 청중 투표 → 다수표 선택지가 결정 → 게이지 줄어듦 + 빨간 데미지

  for (let i = 0; i < totalRounds; i++) {
    const roundNum = i + 1;
    const round = rounds[i];
    const correctIdx = round.correct;   // undefined → 어느 답이든 정답으로 간주
    let attempt = 0;
    let solved = false;

    while (!solved) {
      attempt++;
      const roundSceneId = `${sceneId}_r${roundNum}_a${attempt}_${Date.now()}`;
      const retryLabel = attempt > 1 ? ` · 재시도 ${attempt-1}회` : '';

      // 라운드 영역 렌더
      const roundArea = document.getElementById('lbRoundArea');
      roundArea.innerHTML = `
        <div class="lb-round-header">
          <div class="lb-round-num">ROUND ${roundNum} / ${totalRounds}${retryLabel}</div>
          <div class="lb-round-question">${escapeHtml(round.question || '선택지')}</div>
          <div class="lb-timer" id="lbTimer">⏱ --s</div>
        </div>
        <div class="lb-options" style="margin-top: 16px;">
          ${round.options.map((opt, idx) => `
            <div class="lb-option" data-idx="${idx}">
              <div class="lb-option-letter">${String.fromCharCode(65 + idx)})</div>
              <div class="lb-option-text">${escapeHtml(opt)}</div>
              <div class="lb-option-count" id="lbCount_${idx}">0</div>
              <div class="lb-option-bar" id="lbBar_${idx}" style="width: 0%;"></div>
            </div>
          `).join('')}
        </div>
      `;

      // Firebase 에 라운드 상태 쓰기
      const roundStartedAt = serverNow();
      await set(stateRef, {
        scene_id: roundSceneId,
        type: 'logic_break',
        started_at: roundStartedAt,
        duration: roundDuration,
        payload: {
          quest_title: scene.quest_title,
          description: scene.description,
          current_round: roundNum,
          total_rounds: totalRounds,
          attempt: attempt,
          question: round.question,
          options: round.options,
          gauge: 100 - (i * (100 / totalRounds))
        },
        phase: 'collecting',
        updated_at: Date.now()
      });

      // 라운드 동안 투표 수집 + 라이브 카운트
      currentInputs = {};
      if (inputsUnsubscribe) inputsUnsubscribe();
      inputsUnsubscribe = onValue(ref(db, `inputs/${roundSceneId}`), (snap) => {
        currentInputs = snap.val() || {};
        updateLogicBreakCounts(round.options, currentInputs);
      });

      // ★ currentOverlayState 를 non-null 로 설정 — 안 그러면 startOverlayTimer 의 tick 이 즉시 반환됨
      currentOverlayState = { scene_id: roundSceneId, overlay: { type: 'logic_break' }, started_at: roundStartedAt };
      startOverlayTimer(roundDuration, roundStartedAt);
      runLogicBreakTimerLoop();
      await waitForOverlayTimer();
      stopLogicBreakTimerLoop();

      // 결과 계산 — 다수표 선택지 (동률이면 첫 번째)
      const tally = {};
      for (const uid in currentInputs) {
        const c = currentInputs[uid]?.input?.choice;
        if (c) tally[c] = (tally[c] || 0) + 1;
      }
      let winnerIdx = 0, winnerCount = -1;
      round.options.forEach((opt, idx) => {
        if ((tally[opt] || 0) > winnerCount) {
          winnerCount = tally[opt] || 0;
          winnerIdx = idx;
        }
      });
      const winner = round.options[winnerIdx];
      const isCorrect = (correctIdx === undefined || correctIdx === null) || (winnerIdx === correctIdx);
      const correctOpt = (correctIdx !== undefined && correctIdx !== null) ? round.options[correctIdx] : null;
      console.log(`  Round ${roundNum} attempt ${attempt} winner: ${winner} → ${isCorrect ? 'CORRECT' : 'WRONG'}`);

      // Firebase reveal — 청중 폰에도 결과 공개
      await update(stateRef, {
        phase: 'reveal',
        winner_option: winner,
        correct_option: correctOpt,
        was_correct: isCorrect,
        updated_at: Date.now()
      });

      // 메인 화면: 승자 강조 (정답이면 노란색/winner, 오답이면 빨간색/failed)
      document.querySelectorAll('.lb-option').forEach((el, idx) => {
        if (idx === winnerIdx) {
          el.classList.add(isCorrect ? 'winner' : 'failed');
        }
        // 오답이라면 진짜 정답도 표시
        if (!isCorrect && correctIdx !== null && idx === correctIdx) {
          el.classList.add('correct-hint');
        }
      });

      if (isCorrect) {
        // 정답 → 데미지 효과 + 게이지 감소
        const newGauge = 100 - (roundNum * (100 / totalRounds));
        document.getElementById('lbGaugeFill').style.width = `${newGauge}%`;
        document.getElementById('lbGaugeLabel').textContent = `SYSTEM INTEGRITY · ${Math.round(newGauge)}%`;
        document.getElementById('lbGaugeWrap').classList.remove('damage');
        void document.getElementById('lbGaugeWrap').offsetWidth;
        document.getElementById('lbGaugeWrap').classList.add('damage');
        document.getElementById('lbScreenDamage').classList.remove('flash');
        void document.getElementById('lbScreenDamage').offsetWidth;
        document.getElementById('lbScreenDamage').classList.add('flash');
        await sleep(revealDuration);
        winners.push(winner);
        solved = true;
      } else {
        // 오답 → 빨간 거부 효과 + 재시도 (게이지 변동 없음)
        document.getElementById('lbScreenDamage').classList.remove('flash');
        void document.getElementById('lbScreenDamage').offsetWidth;
        document.getElementById('lbScreenDamage').classList.add('flash', 'reject');
        await sleep(revealDuration);
        // 재시도 안내 잠깐 — 다음 iteration 에서 같은 라운드 다시 렌더
        document.getElementById('lbScreenDamage').classList.remove('reject');
      }
    }
  }

  // 3) 모든 라운드 완료 — 성공 배너 잠깐 보여주고 다음 씬
  if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
  const roundArea = document.getElementById('lbRoundArea');
  if (roundArea) {
    roundArea.innerHTML = `<div class="lb-success">💥 시스템 다운! 논리 파괴 성공</div>`;
  }
  // 게이지는 0% 까지 떨어진 상태
  await set(stateRef, {
    scene_id: `${sceneId}_done_${Date.now()}`,
    type: 'logic_break',
    started_at: Date.now(),
    duration: 0,
    payload: { phase_label: 'success', total_rounds: totalRounds, winners: winners },
    phase: 'success',
    updated_at: Date.now()
  });
  await sleep(2400);

  hideOverlay();
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });

  choicesHistory[sceneId] = 'success';
  if (scene.next) return playScene(scene.next);
}

// logic_break 라이브 카운트 / 바 업데이트
function updateLogicBreakCounts(options, inputs) {
  const tally = {};
  for (const uid in inputs) {
    const c = inputs[uid]?.input?.choice;
    if (c) tally[c] = (tally[c] || 0) + 1;
  }
  const total = Object.values(tally).reduce((s, n) => s + n, 0) || 1;
  options.forEach((opt, idx) => {
    const n = tally[opt] || 0;
    const cEl = document.getElementById(`lbCount_${idx}`);
    const bEl = document.getElementById(`lbBar_${idx}`);
    if (cEl) cEl.textContent = n;
    if (bEl) bEl.style.width = `${(n / total) * 100}%`;
  });
}

// logic_break 자체 타이머 표시 루프 (overlayTimer 와 별개로 lbTimer 엘리먼트 갱신)
let lbTimerRaf = null;
function runLogicBreakTimerLoop() {
  const tick = () => {
    const el = document.getElementById('lbTimer');
    if (!el) return;
    const remaining = Math.max(0, overlayTimerStartedAt + overlayTimerDurationMs - serverNow());
    el.textContent = `⏱ ${(remaining/1000).toFixed(1)}s`;
    el.classList.toggle('warning', remaining < 4000);
    if (remaining > 0) lbTimerRaf = requestAnimationFrame(tick);
  };
  lbTimerRaf = requestAnimationFrame(tick);
}
function stopLogicBreakTimerLoop() {
  if (lbTimerRaf) { cancelAnimationFrame(lbTimerRaf); lbTimerRaf = null; }
}

//   3) 진행자가 시작 버튼 누르면 resolve → 호출자가 본 게임 진행
// ════════════════════════════════════════════════════════════

async function runChoiceOnlyScene(sceneId, scene) {
  hideEnding();
  // 검은 화면 유지 (직전 영상의 마지막 프레임이 남아있어도 그대로 OK)

  // 게임 인트로 (overlay.pre_intro 있으면 시작 버튼까지 대기)
  await runPregameIntro(sceneId, scene.overlay);

  const fbScene = {
    scene_id: `${sceneId}_${Date.now()}`,
    type: scene.overlay.type || 'choice',
    started_at: serverNow(),
    duration: scene.overlay.duration || 10000,
    payload: buildOverlayPayload(scene.overlay),
    phase: 'collecting',
    updated_at: Date.now()
  };
  await set(stateRef, fbScene);
  subscribeToInputs(fbScene.scene_id, scene.overlay);
  showOverlay(fbScene.scene_id, scene.overlay, fbScene.started_at);

  await waitForOverlayTimer();

  // ──────────────────────────────────────────────
  // 결과 계산 — result_mode 가 'success_fail' 이면 성공/실패 판정 (map_align/match3 포함),
  //   아니면 기존 winner 로직. runVideoScene 의 overlay 처리부와 동일 패턴.
  // ──────────────────────────────────────────────
  const finalTally = aggregateInputs(scene.overlay.type, currentInputs);
  let outcome;
  if (scene.overlay.result_mode === 'success_fail') {
    outcome = computeSuccessFail(scene.overlay, finalTally, currentInputs);
  } else {
    outcome = pickWinner(scene.overlay.type, currentInputs, scene.overlay, scene.next);
  }
  console.log('  Outcome:', outcome);
  choicesHistory[sceneId] = outcome;

  // map_align / match3 1/2/3등 보관 (took_ms 빠른 순) — 크레딧 씬용
  if (scene.overlay.type === 'map_align' || scene.overlay.type === 'match3') {
    const successKey = scene.overlay.type === 'match3' ? 'eliminated' : 'aligned';
    const ranked = Object.values(currentInputs)
      .filter(i => i?.input?.[successKey])
      .sort((a, b) => {
        const at = a.input?.took_ms ?? a.timestamp ?? 0;
        const bt = b.input?.took_ms ?? b.timestamp ?? 0;
        return at - bt;
      })
      .slice(0, 3)
      .map(w => ({ nickname: w.nickname || '익명', took_ms: w.input?.took_ms ?? null }));
    if (scene.overlay.type === 'map_align') mapAlignWinners = ranked;
    else match3Winners = ranked;
    // MVP 점수
    awardGamePoints(ranked.map(w => w.nickname), scene.overlay.type);
  }

  // reveal 단계
  await update(stateRef, { phase: 'reveal', updated_at: Date.now() });
  if (scene.overlay.result_mode === 'success_fail') {
    renderSuccessFail(outcome, scene.overlay, finalTally);
  } else {
    renderOverlay(
      scene.overlay.options || ['O','X'],
      finalTally,
      scene.overlay,
      true
    );
  }
  await sleep(3000);

  hideOverlay();
  if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });

  const nextId = scene.next[outcome] || scene.next.default;
  if (nextId) return playScene(nextId);
}

async function runVideoScene(sceneId, scene) {
  // 1) 영상 로드
  await loadIntoStandby(scene.src);
  swapVideos();
  hideOverlay();
  hideEnding();

  // 새 영상 시작 시 진행자 일시정지 상태 초기화 + 버튼 라벨 복구
  presenterPaused = false;
  const pbtn = document.getElementById('pauseBtn');
  if (pbtn) pbtn.textContent = '⏸ 일시정지';

  // 2) freeze 지점 계산 — duration 알려면 metadata 필요
  await waitForDuration(activeVideo);
  const totalDuration = activeVideo.duration || 0;

  // 2-b) chapter_card 가 정의돼있으면 영상 중간에 한 번 멈춰서 챕터 카드 띄움
  //   예: { freeze_at: 11.0, chapter_label: '제 8장', title: '가슴의 방' }
  //   본 overlay/freeze 와 별개로 먼저 처리됨
  //   chapter_card.bgm 이 정의되어 있으면 freeze 도달 시점에 BGM 변경 (영상 도중 BGM 변경 용)
  if (scene.chapter_card && scene.chapter_card.freeze_at !== undefined) {
    const cc = scene.chapter_card;
    const ccSlow = cc.slow_duration ?? 0.5;
    await playUntilFreeze(activeVideo, cc.freeze_at, ccSlow);

    // 챕터 카드 등장 시점 BGM 변경 (freeze 와 동시)
    if ('bgm' in cc) {
      playBgm(cc.bgm, cc.bgm_volume, cc.bgm_fade_ms);
    }

    // Firebase 에 챕터 카드 상태 쓰기 → 청중 폰 동기화
    const ccSceneId = `${sceneId}_chapter_${Date.now()}`;
    const ccStartedAt = serverNow();
    await set(stateRef, {
      scene_id: ccSceneId,
      type: 'chapter_title',
      started_at: ccStartedAt,
      duration: 999999,
      payload: { chapter_label: cc.chapter_label || '', title: cc.title || '' },
      phase: 'intro',
      updated_at: Date.now()
    });

    // 메인 화면에 챕터 카드 오버레이 표시 + 진행자 버튼 대기
    currentOverlayState = { scene_id: ccSceneId, overlay: { type: 'chapter_title' }, started_at: ccStartedAt };
    startOverlayTimer(999999, ccStartedAt);    // waitForOverlayTimer() 가 stopOverlayTimer() 호출 시 깨어나도록
    renderOverlay(null, null, {
      type: 'chapter_title',
      chapter_label: cc.chapter_label,
      title: cc.title
    }, false);
    overlay.classList.add('show');

    await waitForOverlayTimer();   // 진행자가 "▶ 다음 진행" 누르면 stopOverlayTimer 발동 → resolve

    // 챕터 카드 정리 — 영상 이어 재생 준비
    hideOverlay();
    await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
  }

  let freezeAt = null;
  if (scene.freeze_at !== undefined) {
    freezeAt = scene.freeze_at;
  } else if (scene.freeze_before_end !== undefined) {
    freezeAt = totalDuration - scene.freeze_before_end;
  }

  // 3) 재생
  if (freezeAt !== null && scene.overlay) {
    const slow = scene.slow_duration ?? 2.0;
    await playUntilFreeze(activeVideo, freezeAt, slow);

    // overlay 등장 시점 BGM 변경 (영상 도중 freeze 시 BGM 끄기/바꾸기 용)
    //   예: 머리의 방 챕터 등장 시 BGM 페이드아웃 → overlay: { ..., bgm: null }
    if ('bgm' in scene.overlay) {
      playBgm(scene.overlay.bgm, scene.overlay.bgm_volume, scene.overlay.bgm_fade_ms);
    }
    // 3-b) 게임 인트로 (overlay.pre_intro 있으면 시작 버튼까지 대기 — 영상은 freeze 상태로 정지)
    await runPregameIntro(sceneId, scene.overlay);

    // 3-c) 반응속도 게임용 — 인트로 후 랜덤 대기 (청중 폰엔 "준비...", 메인엔 큰 안내문)
    if (scene.overlay.pre_delay_min_ms) {
      const minMs = scene.overlay.pre_delay_min_ms;
      const maxMs = scene.overlay.pre_delay_max_ms || minMs;
      const delay = Math.floor(minMs + Math.random() * (maxMs - minMs));
      console.log(`  reaction pre_delay: ${delay}ms`);

      // Firebase 에 "대기 중" 상태 — 청중 폰은 reaction_wait 렌더링
      const waitSceneId = `${sceneId}_wait_${Date.now()}`;
      await set(stateRef, {
        scene_id: waitSceneId,
        type: 'reaction_wait',
        phase: 'pre_delay',
        started_at: serverNow(),
        duration: 0,
        payload: { prompt: scene.overlay.prompt || '준비하세요...' },
        updated_at: Date.now()
      });

      // 메인 화면도 "준비..." 표시 (큰 글씨)
      overlayContent.innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; gap:32px; padding: 60px 0;">
          <div style="font-size: clamp(60px, 8vw, 120px); font-weight: 800; opacity: 0.5; letter-spacing: 0.05em;">
            🤫 준비...
          </div>
          <div style="font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--muted); letter-spacing: 0.15em;">
            ── 곧 "지금!" 이 나타납니다 ──
          </div>
        </div>
      `;
      // overlay 가 아직 안 떠있으면 띄움 (pre_intro 후엔 보통 떠있음)
      overlay.classList.add('show');
      // currentOverlayState — 타이머/대기 안전용
      currentOverlayState = { scene_id: waitSceneId, overlay: { type: 'reaction_wait' }, started_at: serverNow() };

      await sleep(delay);
    }

    // 4) Firebase 에 씬 상태 쓰기 → 청중 폰 알림
    const fbScene = {
      scene_id: `${sceneId}_${Date.now()}`,
      type: scene.overlay.type,
      started_at: serverNow(),
      duration: scene.overlay.duration || 10000,
      payload: buildOverlayPayload(scene.overlay),
      phase: 'collecting',
      updated_at: Date.now()
    };
    await set(stateRef, fbScene);

    // 5) inputs 구독 시작 + 오버레이 표시
    subscribeToInputs(fbScene.scene_id, scene.overlay);
    showOverlay(fbScene.scene_id, scene.overlay, fbScene.started_at);

    // 6) 투표 시간 동안 대기 (진행자가 ⏹ 버튼이나 −Ns 로 단축 가능)
    await waitForOverlayTimer();

    // 6-a) 반응속도 게임: duration 이 0 이 된 직후에도 청중의 늦은 탭 입력이
    //   Firebase 로 도착할 수 있도록 짧은 버퍼 시간 부여 (~Firebase RTT 보정).
    //   audience 쪽 그레이스 (400ms) 와 합쳐 ~500ms 동안 늦은 탭 수용.
    //   메인 화면 자체는 이미 "지금!" 으로 뜬 상태이므로 진행자 보기엔 자연스러움.
    if (scene.overlay.pre_delay_min_ms) {
      await sleep(500);
    }

    // 6-b) manual / chapter_title — 청중 투표가 아니라 진행자 버튼 클릭, reveal 없이 바로 진행
    if (scene.overlay.type === 'manual' || scene.overlay.type === 'chapter_title') {
      console.log('  Manual advance (' + scene.overlay.type + ')');
      choicesHistory[sceneId] = 'default';
      hideOverlay();
      if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
      await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
      // 영상 이어 재생
      if (scene.resume_after_overlay) {
        await playToEnd(activeVideo);
      }
      const nextManualId = (typeof scene.next === 'string')
        ? scene.next
        : (scene.next.default || Object.values(scene.next || {})[0]);
      if (nextManualId) return playScene(nextManualId);
      return;
    }

    // 7) 결과 계산 — result_mode 가 'success_fail' 이면 성공/실패 판정, 아니면 기존 winner 로직
    const finalTally = aggregateInputs(scene.overlay.type, currentInputs);
    let outcome;
    if (scene.overlay.result_mode === 'success_fail') {
      outcome = computeSuccessFail(scene.overlay, finalTally, currentInputs);
    } else {
      outcome = pickWinner(scene.overlay.type, currentInputs, scene.overlay, scene.next);
    }
    console.log('  Outcome:', outcome);
    choicesHistory[sceneId] = outcome;

    // 7-b) qte_burst 의 최종 통계를 크레딧 씬에서 쓰도록 보관
    if (scene.overlay.type === 'qte_burst') {
      qteBurstFinalStats = finalTally;
      // MVP 점수 — 누적 탭 카운트 Top 3
      const topTappers = Object.entries(finalTally)
        .filter(([, c]) => c > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([nick]) => nick);
      awardGamePoints(topTappers, 'qte_burst');
    }
    // 7-b2) 반응속도 게임 [pre_delay_min_ms 있으면] — timestamp 빠른 순 Top 3
    if (scene.overlay.pre_delay_min_ms && outcome === 'success') {
      const fastest = Object.values(currentInputs)
        .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0))
        .slice(0, 3)
        .map(w => w.nickname || '익명');
      awardGamePoints(fastest, 'reaction');
    }
    // 7-c) map_align / match3 의 1/2/3등 보관 (took_ms 빠른 순)
    if (scene.overlay.type === 'map_align' || scene.overlay.type === 'match3') {
      const successKey = scene.overlay.type === 'match3' ? 'eliminated' : 'aligned';
      const ranked = Object.values(currentInputs)
        .filter(i => i?.input?.[successKey])
        .sort((a, b) => {
          const at = a.input?.took_ms ?? a.timestamp ?? 0;
          const bt = b.input?.took_ms ?? b.timestamp ?? 0;
          return at - bt;
        })
        .slice(0, 3)
        .map(w => ({ nickname: w.nickname || '익명', took_ms: w.input?.took_ms ?? null }));
      if (scene.overlay.type === 'map_align') mapAlignWinners = ranked;
      else match3Winners = ranked;
      // MVP 점수
      awardGamePoints(ranked.map(w => w.nickname), scene.overlay.type);
    }

    // 8) reveal 단계
    await update(stateRef, { phase: 'reveal', updated_at: Date.now() });
    if (scene.overlay.result_mode === 'success_fail') {
      renderSuccessFail(outcome, scene.overlay, finalTally);
    } else {
      renderOverlay(scene.overlay.options || ['O','X'], finalTally, scene.overlay, true);
    }

    // 9) 결과 음미 시간
    await sleep(3000);

    // 10) 청중 폰 대기 상태로
    hideOverlay();
    if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
    await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });

    // 10-b) 멈춰있던 영상 끝까지 재생 (resume_after_overlay) — 실패 시엔 스킵
    if (scene.resume_after_overlay && outcome !== 'fail') {
      await playToEnd(activeVideo);
    }

    // 11) 분기
    const nextId = scene.next[outcome] || scene.next.default;
    if (nextId) return playScene(nextId);
  } else {
    // freeze 없는 단순 재생
    await playToEnd(activeVideo);
    if (scene.next) {
      const nextId = typeof scene.next === 'string' ? scene.next : scene.next.default;
      if (nextId) return playScene(nextId);
    }
  }
}

async function runEndingScene(scene) {
  hideOverlay();
  // 결말 영상이 있으면 재생
  if (scene.src) {
    await loadIntoStandby(scene.src);
    swapVideos();
    await playToEnd(activeVideo);
  }
  showEnding(scene);
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
}

// ════════════════════════════════════════════════════════════
async function runGameOverScene(scene) {
  hideOverlay();
  hideEnding();
  vA.pause(); vB.pause();

  vB.classList.remove('active');

    if (nextId) return playScene(nextId);

}

// 엔딩 크레딧 — 영화 엔딩처럼 아래에서 위로 스크롤
// ════════════════════════════════════════════════════════════
async function runCreditsScene(scene) {
  hideOverlay();
  hideEnding();
  // 검은 배경만 남기고 영상은 정지 (마지막 프레임 안 남게)
  vA.pause(); vB.pause();
  vA.classList.remove('active');
  vB.classList.remove('active');

  const screen = document.getElementById('creditsScreen');
  const restartBtn = document.getElementById('creditsRestartBtn');

  screen.innerHTML = `<div class="credits-roll" id="creditsRoll">${buildCreditsHtml(scene)}</div>`;
  const roll = document.getElementById('creditsRoll');
  const durationMs = scene.duration || 70000;
  screen.classList.add('show');

  // 컨텐츠 높이가 화면 높이보다 클 수 있으므로, CSS keyframe 대신 JS 로 동적 스크롤.
  // 시작: 컨텐츠 윗부분이 화면 바닥에 위치 (translateY = +viewport)
  // 끝:   컨텐츠 아랫부분이 화면 천장을 넘어감 (translateY = -contentHeight)
  // 이렇게 해야 메시지 같은 긴 컨텐츠 끝까지 다 보임.
  // requestAnimationFrame 두 번 기다려서 레이아웃 완료 후 transition 트리거.
  roll.style.animation = 'none';                  // 기존 CSS 애니메이션 비활성
  roll.style.top = '0';
  roll.style.transition = 'none';
  roll.style.transform = `translate(-50%, ${window.innerHeight}px)`;

  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  const contentH = roll.offsetHeight;

  roll.style.transition = `transform ${durationMs}ms linear`;
  roll.style.transform = `translate(-50%, ${-contentH}px)`;

  // 스크롤 완료 시 다시 시작 버튼 노출
  const onEnd = (ev) => {
    if (ev && ev.propertyName !== 'transform') return;
    roll.removeEventListener('transitionend', onEnd);
    restartBtn.classList.add('show');
  };
  roll.addEventListener('transitionend', onEnd);

  await set(stateRef, { scene_id: '', type: 'credits', phase: 'idle', updated_at: Date.now() });
}

function hideCredits() {
  const screen = document.getElementById('creditsScreen');
  const restartBtn = document.getElementById('creditsRestartBtn');
  if (screen) {
    screen.classList.remove('show');
    screen.innerHTML = '';
  }
  if (restartBtn) restartBtn.classList.remove('show');
}

function buildCreditsHtml(scene) {
  // 실시간 참가자 닉네임 — currentUsers 가 { userId: { nickname, ... } } 가정
  const usersArr = Object.values(currentUsers || {});
  const nicknames = usersArr
    .map(u => (u && (u.nickname || u.name)) || '')
    .filter(Boolean);

  // 7-3 탭 통계 (있으면) — Top 3 로 통일
  let topTappers = [];
  let tapTotal = 0;
  if (qteBurstFinalStats) {
    const entries = Object.entries(qteBurstFinalStats).filter(([, c]) => c > 0);
    topTappers = entries.sort((a, b) => b[1] - a[1]).slice(0, 3);
    tapTotal = entries.reduce((sum, [, c]) => sum + (c || 0), 0);
  }

  const castHtml = nicknames.length
    ? nicknames.map(n => `<div class="row">${escapeHtml(n)}</div>`).join('')
    : `<div class="row" style="color:var(--muted)">참가자 정보 없음</div>`;

  const rankEmoji = ['1', '2', '3'];

  const tapStatsHtml = topTappers.length ? `
    <section>
      <h3>⚡ Tapping — Top 3</h3>
      ${topTappers.map(([name, count], idx) => `
        <div class="row">
          <span class="mission-rank">${rankEmoji[idx] || (idx+1)}</span>
          ${escapeHtml(name)}
          <span class="cnt">${count}</span>
        </div>
      `).join('')}
      <div class="big-stat" style="margin-top:24px">${tapTotal.toLocaleString()}<span style="font-size:.4em;color:var(--muted);margin-left:8px">Total Clicks</span></div>
    </section>
  ` : '';

  // 미션별 1/2/3등 (지도 정렬, 매치3) — took_ms 빠른 순
  const renderMissionTop3 = (winners, missionLabel, emptyMsg) => {
    if (!winners || !winners.length) return '';
    const rows = winners.slice(0, 3).map((w, idx) => {
      const secs = (w.took_ms != null) ? (w.took_ms / 1000).toFixed(1) + 's' : '';
      return `<div class="row">
        <span class="mission-rank">${rankEmoji[idx] || (idx+1)}</span>
        ${escapeHtml(w.nickname)}
        <span class="cnt">${secs}</span>
      </div>`;
    }).join('');
    return `
      <section>
        <h3>${escapeHtml(missionLabel)}</h3>
        ${rows}
      </section>`;
  };
  const missionWinnersHtml =
    renderMissionTop3(mapAlignWinners, '🗺️ 지도 정렬 — Top 3') +
    renderMissionTop3(match3Winners, '🔍 숨은 폭력 찾기 — Top 3');

  // 🏆 게임 MVP — 모든 게임 1/2/3등 점수 합산 Top 3 (각 게임 +3/+2/+1)
  const mvpRanked = Object.entries(gameScores)
    .filter(([, p]) => p > 0)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3);
  const mvpHtml = mvpRanked.length ? `
    <section>
      <h3>🏆 Game MVP</h3>
      ${mvpRanked.map(([nick, pts], idx) => `
        <div class="row">
          <span class="mission-rank">${rankEmoji[idx] || (idx+1)}</span>
          ${escapeHtml(nick)}
          <span class="cnt">${pts}점</span>
        </div>
      `).join('')}
    </section>
  ` : '';

  const producers = scene.producers || [];
  const producersHtml = producers.map(p => `<div class="row">${escapeHtml(p)}</div>`).join('');

  // 수강생/교수님 메시지 — 이름 + 후기 문장 (교수님은 색 다르게)
  const messages = scene.messages || [];
  const messagesHtml = messages.map(m => {
    const isTeacher = (m.name || '').includes('교수');
    return `
      <div class="message ${isTeacher ? 'message-teacher' : ''}">
        <div class="name">${escapeHtml(m.name || '')}</div>
        <div class="text">${escapeHtml(m.text || '')}</div>
      </div>`;
  }).join('');
  const messagesSection = messages.length ? `
    <section>
      <h3>From The Class</h3>
      ${messagesHtml}
    </section>` : '';

  return `
    <h1>${escapeHtml(scene.title || '🎬 The End')}</h1>
    <div class="subtitle">${escapeHtml(scene.subtitle || '')}</div>

    <section>
      <h3>Cast</h3>
      ${castHtml}
    </section>

    ${missionWinnersHtml}

    ${tapStatsHtml}

    ${mvpHtml}

    <section>
      <h3>Produced By</h3>
      ${producersHtml}
    </section>

    <section>
      <h3>Supervised By</h3>
      <div class="row">${escapeHtml(scene.supervisor || '')}</div>
    </section>

    ${messagesSection}

    <section>
      <h3>${escapeHtml(scene.course || '')}</h3>
      <div class="closing">${escapeHtml(scene.closing || '')}</div>
    </section>
  `;
}

function waitForDuration(video) {
  return new Promise(resolve => {
    if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) return resolve();
    video.addEventListener('loadedmetadata', () => resolve(), { once: true });
    setTimeout(resolve, 3000);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Firebase 는 undefined 키를 거부하므로 정의된 필드만 골라서 페이로드 구성
function buildOverlayPayload(overlay) {
  const p = { prompt: overlay.prompt || '' };
  if (overlay.options) {
    p.options = overlay.options;
  } else if (overlay.type === 'ox') {
    p.options = ['O', 'X'];
  }
  // 거부 선택지 — 청중 폰에서 탭하면 흔들리며 비활성화 (선택지의 환상만 주는 강제 분기용)
  if (overlay.reject_options) p.reject_options = overlay.reject_options;
  if (overlay.tap_target_per_user !== undefined) p.tap_target_per_user = overlay.tap_target_per_user;
  if (overlay.tap_target_total !== undefined) p.tap_target_total = overlay.tap_target_total;
  // map_align 전용 필드 전달 — 청중 폰 audience.html 에서 사용
  if (overlay.type === 'map_align') {
    p.map_src        = overlay.map_src        || 'map.png';
    p.omap_src       = overlay.omap_src       || 'omap.png';
    p.target_x_pct   = overlay.target_x_pct   ?? 50;
    p.target_y_pct   = overlay.target_y_pct   ?? 50;
    p.tolerance_pct  = overlay.tolerance_pct  ?? 4;
    p.start_dx_pct   = overlay.start_dx_pct   ?? 22;
    p.start_dy_pct   = overlay.start_dy_pct   ?? -14;
    p.winners_needed = overlay.winners_needed ?? 3;
    p.omap_width_pct = overlay.omap_width_pct ?? 100;
  }
  // manual 전용 — 청중에게는 안내 문구만, 진행자가 메인에서 수동 진행
  if (overlay.type === 'manual') {
    p.advance_label = overlay.advance_label || '✓ 다음 진행';
  }
  // chapter_title 오버레이 — 청중 폰에도 동일한 챕터 카드 표시
  if (overlay.type === 'chapter_title') {
    p.chapter_label = overlay.chapter_label || '';
    p.title         = overlay.title         || '';
  }
  // match3 전용 필드 전달 — 청중 폰에서 게임 구동
  if (overlay.type === 'match3') {
    p.dangers        = overlay.dangers        || ['🔫', '🔪', '🏏'];
    p.safes          = overlay.safes          || ['🍎', '🍋', '🍇', '🍓', '🌸'];
    p.rows           = overlay.rows           || 7;
    p.cols           = overlay.cols           || 6;
    p.winners_needed = overlay.winners_needed ?? 3;
  }
  return p;
}

// ════════════════════════════════════════════════════════════
// inputs 구독 & 집계
// ════════════════════════════════════════════════════════════
function subscribeToInputs(scene_id, overlayDef) {
  currentInputs = {};
  if (inputsUnsubscribe) inputsUnsubscribe();
  inputsUnsubscribe = onValue(ref(db, `inputs/${scene_id}`), (snap) => {
    currentInputs = snap.val() || {};
    if (currentOverlayState?.scene_id === scene_id) {
      const tally = aggregateInputs(overlayDef.type, currentInputs);
      const opts = overlayDef.options || (overlayDef.type === 'ox' ? ['O','X'] : []);
      renderOverlay(opts, tally, overlayDef, false);
    }
    // map_align / match3: 선착순 N명 완성 시 타이머 즉시 종료 → 다음 단계로
    if (overlayDef.type === 'map_align' || overlayDef.type === 'match3') {
      const needed = overlayDef.winners_needed ?? 3;
      const successKey = overlayDef.type === 'map_align' ? 'aligned' : 'eliminated';
      const successCount = Object.values(currentInputs).filter(i => i?.input?.[successKey]).length;
      if (successCount >= needed && overlayTimerDurationMs > 0) {
        console.log(`  ${overlayDef.type}: ${successCount}/${needed} 완성 → 조기 종료`);
        stopOverlayTimer();
      }
    }
  });
}

function aggregateInputs(type, inputs) {
  const t = {};
  for (const userId in inputs) {
    const i = inputs[userId];
    if (!i) continue;
    if (type === 'choice' || type === 'ox') {
      const k = i.input?.choice;
      if (k) t[k] = (t[k] || 0) + 1;
    } else if (type === 'qte_burst') {
      t[i.nickname] = i.input?.count || 0;
    } else if (type === 'text') {
      const w = (i.input?.text || '').trim();
      if (w) t[w] = (t[w] || 0) + 1;
    }
  }
  return t;
}

function pickWinner(type, inputs, overlayDef, nextMap) {
  if (type === 'choice' || type === 'ox') {
    const tally = aggregateInputs(type, inputs);
    const sorted = Object.entries(tally).sort((a,b) => b[1] - a[1]);
    return sorted[0]?.[0] || 'default';
  }
  if (type === 'qte') {
    const reacted = Object.keys(inputs).length;
    // threshold: 청중의 X 비율 이상 반응 시 success
    const threshold = overlayDef.threshold ?? 0.5;
    const total = Object.keys(currentUsers).length || 1;
    return (reacted / total >= threshold) ? 'success' : 'fail';
  }
  return 'default';
}

async function startGame() {
  // 청중이 1명도 없으면 시작 차단
  const userCount = Object.keys(currentUsers).length;
  if (userCount === 0) {
    alert('청중이 1명 이상 접속해야 게임을 시작할 수 있어요.');
    return;
  }
  document.getElementById('startScreen').classList.add('hide');
  document.getElementById('devControls').classList.add('active');
  // 청중 입력 초기화
  await remove(ref(db, 'inputs'));
  // 시작 씬 재생
  playScene(START_SCENE);
}

window.restartGame = async function() {
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('devControls').classList.remove('active');
  document.getElementById('gameOverScreen').classList.remove('show');
  hideEnding();
  hideOverlay();
  hideCredits();
  qteBurstFinalStats = null;
  mapAlignWinners = null;
  match3Winners = null;
  // gameScores 는 const 라서 재할당 불가 — 키만 비우기
  for (const k of Object.keys(gameScores)) delete gameScores[k];
  vA.pause(); vB.pause();
  vA.src = ''; vB.src = '';
  vA.classList.remove('active');
  vB.classList.remove('active');
  if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
  await remove(ref(db, 'inputs'));
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
  document.getElementById('startScreen').classList.remove('hide');
};

document.getElementById('startBtn').onclick = startGame;
document.getElementById('kickAllBtn').onclick = async () => {
  if (!confirm('모든 접속자를 강제 로그아웃 시킬까요?\n청중은 닉네임 입력 화면으로 돌아갑니다.')) return;
  // 1) users 와 inputs 데이터 삭제

  await remove(ref(db, 'inputs'));

};

// ────────────────────────────────────────────────
// 진행자 컨트롤 와이어업
// ────────────────────────────────────────────────
document.getElementById('skipVideoBtn').onclick = () => {
  // 현재 active 영상의 currentTime 을 끝으로 점프
  //   - playUntilFreeze 의 RAF 모니터가 freezeAt 으로 catch 해서 pause + resolve
  //   - playToEnd 는 'ended' 이벤트 발화로 resolve
  if (!activeVideo) return;
  const dur = activeVideo.duration;
  if (dur && isFinite(dur)) {
    try { activeVideo.currentTime = Math.max(0, dur - 0.1); } catch(e) { console.warn('skip failed', e); }
  }
};

// 일시정지 토글 — 진행자가 발표 중 잠깐 멈출 때
//   - 재생 중일 때만 작동, 진행자가 누른 상태에서만 다시 재생 가능
//   - freeze 등 자동 정지 상태일 땐 클릭해도 무시 (실수로 freeze 해제되는 사고 방지)
document.getElementById('pauseBtn').onclick = () => {
  if (!activeVideo) return;
  const btn = document.getElementById('pauseBtn');
  if (presenterPaused) {
    // 진행자가 멈췄던 상태 → 재생 재개
    activeVideo.play().catch(err => console.warn('play failed', err));
    presenterPaused = false;
    btn.textContent = '⏸ 일시정지';
  } else if (!activeVideo.paused) {
    // 재생 중 → 진행자가 일시정지
    activeVideo.pause();
    presenterPaused = true;
    btn.textContent = '▶ 재생';
  }
  // else: 자동 정지 (freeze / 씬 전환) 중 — 클릭 무시
};

document.getElementById('shave5Btn').onclick = () => shaveOverlayTimer(5000);
document.getElementById('endVoteBtn').onclick = () => shaveOverlayTimer(99999999);

// 유틸
// ════════════════════════════════════════════════════════════
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// 초기화: idle 상태로 셋
