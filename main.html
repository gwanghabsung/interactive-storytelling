<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Interactive Audience Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: rgba(21,21,28,0.85);
    --surface-2: rgba(31,31,40,0.9);
    --line: rgba(255,255,255,0.12);
    --text: #f5f5f7;
    --muted: #9999aa;
    --accent: #ffd60a;
    --danger: #ff3d71;
    --success: #00d68f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'Bricolage Grotesque', sans-serif;
    overflow: hidden;
  }

  /* ── 영상 스테이지 (풀스크린) ── */
  .stage {
    position: fixed; inset: 0;
    background: #000;
  }
  .vid-layer {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .vid-layer.active { opacity: 1; }

  /* ── 오버레이 ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 60px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .overlay-backdrop {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.85) 100%);
    z-index: 0;
  }

  .overlay-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    gap: 32px; max-width: 1200px; width: 100%;
  }

  .overlay-prompt {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    text-shadow: 0 4px 24px rgba(0,0,0,0.8);
  }

  .overlay-timer {
    font-family: 'Orbitron', 'JetBrains Mono', monospace;
    font-size: 80px; font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-shadow:
      0 0 12px rgba(255,214,10,0.85),
      0 0 28px rgba(255,214,10,0.5),
      0 0 56px rgba(255,214,10,0.25);
    transition: color 0.3s, text-shadow 0.3s;
  }
  .overlay-timer.warning {
    color: var(--danger);
    text-shadow:
      0 0 12px rgba(255,61,113,0.85),
      0 0 28px rgba(255,61,113,0.55),
      0 0 56px rgba(255,61,113,0.3);
    animation: shake 0.3s ease-in-out infinite;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }

  /* 결과 막대 */
  .results-grid {
    width: 100%; max-width: 900px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .res-row {
    display: grid; grid-template-columns: 320px 1fr 100px;
    gap: 20px; align-items: center;
  }
  .res-label {
    font-size: 24px; font-weight: 500; text-align: left;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .res-track {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border-radius: 8px; height: 44px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .res-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #ff8c00);
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .res-row.winner .res-fill {
    background: linear-gradient(90deg, var(--success), #00d68f);
    box-shadow: 0 0 24px rgba(0,214,143,0.4);
  }
  .res-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 700;
    text-align: right;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .status-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text);
    padding: 8px 16px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.15);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── 결말 화면 ── */
  .ending-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 60px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.7), #000 80%);
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }
  .ending-screen.show { opacity: 1; pointer-events: auto; }

  .ending-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .ending-title {
    font-size: clamp(56px, 8vw, 120px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0;
  }
  .ending-subtitle {
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 400;
    color: var(--muted);
    margin: 16px 0 32px;
  }
  .ending-description {
    font-size: 18px; line-height: 1.6;
    max-width: 600px;
    color: var(--text);
    opacity: 0.85;
    margin: 0 0 48px;
  }

  /* ── 시작 화면 ── */
  .start-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 60px;
    background: radial-gradient(ellipse at center, #15151c, #000 80%);
    z-index: 10;
    transition: opacity 0.8s ease;
  }
  .start-screen.hide { opacity: 0; pointer-events: none; }
  .start-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .start-title {
    font-size: clamp(48px, 8vw, 112px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 0.95;
    margin: 0 0 24px;
  }
  .start-info {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 48px;
    font-family: 'JetBrains Mono', monospace;
  }
  .start-info b { color: var(--text); }

  .big-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 20px 64px;
    font-family: inherit;
    font-size: 20px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 40px rgba(255,214,10,0.3);
  }
  .big-btn:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(255,214,10,0.5); }
  .big-btn:active { transform: scale(0.98); }
  .big-btn.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line);
    box-shadow: none;
  }
  .big-btn.ghost:hover { background: rgba(255,255,255,0.05); }

  /* ── HUD (상단 미니 컨트롤) ── */
  .hud {
    position: fixed; top: 16px; right: 16px;
    display: flex; gap: 12px; align-items: center;
    z-index: 100;
  }
  .hud-pill {
    padding: 6px 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .hud-pill .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }
  .hud-pill .dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .hud-btn {
    padding: 6px 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hud-btn:hover { background: rgba(255,255,255,0.1); }

  /* ── 진행자 컨트롤 (영상 스킵 / 타이머 감축) ── */
  .dev-controls {
    position: fixed;
    bottom: 20px; right: 20px;
    display: none;
    gap: 6px;
    z-index: 100;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(10px);
    padding: 6px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  .dev-controls.active { display: flex; }
  .dev-controls:hover { opacity: 1; }
  .dev-btn {
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  .dev-btn:hover { background: rgba(255,255,255,0.18); }
  .dev-btn:active { transform: scale(0.94); }
  .dev-btn.danger { color: var(--danger); border-color: rgba(255,61,113,0.4); }
  .dev-btn.danger:hover { background: rgba(255,61,113,0.15); }

  /* ── QTE BURST (탭핑 연타) ── */
  /* 배터리 박스: 네모칸 안에 큰 숫자, 아래에서 위로 차오름 */
  .qte-battery {
    position: relative;
    width: clamp(360px, 42vw, 560px);
    height: clamp(220px, 28vw, 360px);
    border: 4px solid var(--accent);
    border-radius: 18px;
    background: rgba(0,0,0,0.7);
    overflow: hidden;
    box-shadow:
      0 0 48px rgba(255,214,10,0.35),
      inset 0 0 24px rgba(255,214,10,0.18);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  /* 사이버 그리드 배경 */
  .qte-battery::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,214,10,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,214,10,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 1;
    pointer-events: none;
  }
  .qte-battery-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    background: linear-gradient(180deg,
      rgba(255,214,10,0.55) 0%,
      rgba(255,140,0,0.85) 60%,
      rgba(255,100,0,0.95) 100%);
    box-shadow: 0 -2px 16px rgba(255,214,10,0.5);
    transition: height 80ms linear;
    z-index: 2;
  }
  /* 차오르는 표면에 옅은 wave 효과 */
  .qte-battery-fill::after {
    content: '';
    position: absolute;
    top: -3px; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.6), transparent);
  }
  .qte-battery-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: clamp(120px, 18vw, 220px);
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 16px rgba(0,0,0,0.95),
      0 4px 16px rgba(0,0,0,0.95),
      0 0 32px rgba(255,214,10,0.4);
    letter-spacing: -0.02em;
    line-height: 1;
    z-index: 3;
    transition: transform 0.08s;
  }
  .qte-battery-num.bump { transform: scale(1.12); }
  .qte-battery.done {
    border-color: var(--success);
    box-shadow:
      0 0 64px rgba(0,214,143,0.6),
      inset 0 0 32px rgba(0,214,143,0.28);
  }
  .qte-battery.done .qte-battery-fill {
    background: linear-gradient(180deg,
      rgba(0,214,143,0.7) 0%,
      rgba(0,180,120,0.9) 60%,
      rgba(0,150,100,0.98) 100%);
    box-shadow: 0 -2px 16px rgba(0,214,143,0.6);
    height: 100%;
  }
  .qte-battery.done .qte-battery-num {
    text-shadow:
      0 0 16px rgba(0,0,0,0.95),
      0 4px 16px rgba(0,0,0,0.95),
      0 0 32px rgba(0,214,143,0.5);
  }
  .qte-goal-label {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: -8px;
  }
  /* 마구잡이로 떠다니는 닉네임 (overlay-content 기준 absolute) */
  .qte-names {
    position: absolute;
    inset: -60px;
    pointer-events: none;
    z-index: 0;
  }
  .qte-name {
    position: absolute;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.6);
    animation: qte-pop 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: rgba(255,255,255,0.92);
  }
  .qte-name .cnt {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-left: 6px;
    font-weight: 700;
  }
  @keyframes qte-pop {
    0%   { transform: scale(1.5); opacity: 0.4; }
    60%  { transform: scale(0.94); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── SUCCESS / FAIL 큰 패널 (탭 결과 발표) ── */
  .success-fail-panel {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(80px, 14vw, 220px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    animation: sf-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .success-fail-panel.success-color {
    color: var(--success);
    text-shadow: 0 0 80px rgba(0,214,143,0.55), 0 6px 28px rgba(0,0,0,0.95);
  }
  .success-fail-panel.fail-color {
    color: var(--danger);
    text-shadow: 0 0 80px rgba(255,61,113,0.5), 0 6px 28px rgba(0,0,0,0.95);
  }
  .success-fail-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 700;
    color: var(--text);
    margin-top: 16px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.9);
  }
  .success-fail-sub .goal { color: var(--muted); font-size: 0.7em; }
  @keyframes sf-pop {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── 엔딩 크레딧 (영화 스타일 위로 스크롤) ── */
  .credits-screen {
    position: fixed; inset: 0;
    background: #000;
    z-index: 60;
    overflow: hidden;
    display: none;
  }
  .credits-screen.show { display: block; }
  .credits-roll {
    position: absolute;
    left: 50%;
    transform: translate(-50%, 0);
    top: 100vh;                 /* 시작 위치: 화면 아래 */
    width: 90%; max-width: 720px;
    text-align: center;
    color: #f5f5f7;
    padding-bottom: 60vh;
    animation-name: credits-scroll;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
    /* animation-duration 은 JS 에서 inline 으로 지정 */
  }
  @keyframes credits-scroll {
    0%   { top: 100vh; }
    100% { top: -100%; }
  }
  .credits-roll h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(60px, 9vw, 120px);
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--accent);
    margin: 0 0 16px 0;
  }
  .credits-roll .subtitle {
    font-size: clamp(20px, 2.5vw, 32px);
    font-weight: 400;
    color: var(--muted);
    margin-bottom: 120px;
  }
  .credits-roll section {
    margin-bottom: 100px;
  }
  .credits-roll h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .credits-roll .row {
    font-size: clamp(20px, 2.2vw, 28px);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .credits-roll .row .cnt {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-left: 14px;
    font-weight: 700;
  }
  .credits-roll .big-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(60px, 10vw, 120px);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .credits-roll .closing {
    font-size: clamp(22px, 2.6vw, 32px);
    font-weight: 500;
    line-height: 1.6;
    margin-top: 60px;
    white-space: pre-line;
  }
  /* 수강생 메시지 — 이름 + 한 줄 후기 */
  .credits-roll .message {
    margin-bottom: 38px;
    text-align: left;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
  .credits-roll .message .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(15px, 1.4vw, 18px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .credits-roll .message .text {
    font-size: clamp(19px, 2vw, 26px);
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255,255,255,0.92);
  }
  .credits-roll .message-teacher .name { color: var(--success); }
  .credits-restart {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 61;
    opacity: 0;
    transition: opacity 0.6s;
    pointer-events: none;
  }
  .credits-restart.show { opacity: 1; pointer-events: auto; }

  /* ── GAME OVER 화면 ── */
  .gameover-screen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.93);
    backdrop-filter: blur(10px);
    z-index: 70;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
  }
  .gameover-screen.show {
    display: flex;
    animation: gameover-flash 0.4s ease-out;
  }
  .gameover-text {
    font-family: 'Orbitron', monospace;
    font-size: clamp(80px, 14vw, 220px);
    font-weight: 900;
    color: var(--danger);
    letter-spacing: 0.12em;
    text-shadow:
      0 0 24px rgba(255,61,113,0.9),
      0 0 60px rgba(255,61,113,0.5),
      0 0 120px rgba(255,61,113,0.25);
    animation: gameover-glitch 0.5s ease-out;
    line-height: 1;
  }
  .gameover-sub {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: clamp(20px, 2.4vw, 30px);
    font-weight: 500;
    color: var(--text);
    margin-top: 8px;
  }
  .gameover-hint {
    margin-top: 40px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.7;
    animation: gameover-blink 1s ease-in-out infinite;
  }
  @keyframes gameover-flash {
    0%   { background: rgba(255,61,113,0.55); opacity: 0; }
    30%  { background: rgba(0,0,0,0.93); opacity: 1; }
    100% { background: rgba(0,0,0,0.93); opacity: 1; }
  }
  @keyframes gameover-glitch {
    0%, 100% { transform: translateX(0); }
    10% { transform: translateX(-6px); }
    20% { transform: translateX(6px); }
    30% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    50% { transform: translateX(0); }
  }
  @keyframes gameover-blink {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 0.95; }

// ════════════════════════════════════════════════════════════
// 로컬 영상 매핑 (File API)
// 발표자가 자기 노트북 폴더를 선택하면 그 안의 영상들을 blob URL 로 매핑.
// scenes.js 의 'videos/example.mp4' 같은 경로는 파일명으로 매칭됨.
// ════════════════════════════════════════════════════════════
const localVideos = {};   // { 'example.mp4': blob_url, ... }

document.getElementById('loadVideosBtn').onclick = () => {
  document.getElementById('folderInput').click();
};

document.getElementById('folderInput').onchange = (e) => {
  const files = Array.from(e.target.files || []);
  let loadedCount = 0;
  for (const file of files) {
    // 영상 파일만 (확장자 또는 MIME 검사)
    if (file.type.startsWith('video/') || /\.(mp4|webm|mov|m4v|ogv)$/i.test(file.name)) {
      // 같은 이름이 여러 폴더에 있으면 마지막 것이 이김 (보통 문제 없음)
      localVideos[file.name] = URL.createObjectURL(file);
      loadedCount++;
    }
  }
  const status = document.getElementById('videoStatus');
  if (loadedCount > 0) {
    const fileList = Object.keys(localVideos).slice(0, 5).join(', ');
    const more = Object.keys(localVideos).length > 5 ? ` 외 ${Object.keys(localVideos).length - 5}개` : '';
    status.innerHTML = `✓ <span style="color:var(--success)">${loadedCount}개 영상 로드됨</span> · ${fileList}${more}`;
  } else {
    status.innerHTML = `<span style="color:var(--danger)">⚠ 영상 파일이 없어요. 다시 선택해주세요.</span>`;
  }
};

function resolveVideoSrc(src) {
  if (!src) return src;
  // 외부 URL 이면 그대로 사용
  if (/^(https?:|blob:)/.test(src)) return src;
  // 로컬 매핑에 파일명이 있으면 blob URL 로 치환
  const filename = src.split('/').pop();
  if (localVideos[filename]) return localVideos[filename];
  // 폴백: 상대경로 그대로 (영상이 같은 서버에 있는 경우)
  return src;
}

// ════════════════════════════════════════════════════════════
// 비디오 플레이어 — 이중 버퍼
// ════════════════════════════════════════════════════════════
const vA = document.getElementById('vA');
const vB = document.getElementById('vB');
let activeVideo = vA, standbyVideo = vB;
let presenterPaused = false;  // 진행자가 수동 일시정지 했는지 추적 (자동 freeze 와 구분)

function swapVideos() {
  activeVideo.classList.remove('active');
  standbyVideo.classList.add('active');
  [activeVideo, standbyVideo] = [standbyVideo, activeVideo];
}

// 영상을 standby 슬롯에 로드 후 활성화 (예열 효과)
async function loadIntoStandby(src) {
  const resolved = resolveVideoSrc(src);
  standbyVideo.src = resolved;
  standbyVideo.load();
  await new Promise((resolve, reject) => {
    const onReady = () => { cleanup(); resolve(); };
    const onError = (e) => { cleanup(); reject(e); };
    const cleanup = () => {
      standbyVideo.removeEventListener('canplaythrough', onReady);
      standbyVideo.removeEventListener('error', onError);
    };
    standbyVideo.addEventListener('canplaythrough', onReady, { once: true });
    standbyVideo.addEventListener('error', onError, { once: true });
    // 안전장치: 5초 이내 canplaythrough 안 와도 진행
    setTimeout(resolve, 5000);
  });
}

// 영상을 재생하며 특정 시점(freezeAt)에서 슬로우 + 정지
function playUntilFreeze(video, freezeAt, slowDuration) {
  return new Promise(async (resolve) => {
    video.playbackRate = 1.0;
    video.muted = false;
    try { await video.play(); } catch(e) { video.muted = true; await video.play(); }

    const monitor = () => {
      // ended 만 종료 트리거 — paused 는 진행자가 수동 정지했을 수도 있으니 무시
      // (수동 정지 시엔 currentTime 이 멈추므로 monitor 가 그냥 폴링만 계속함 → resume 하면 다시 동작)
      if (video.ended) { resolve(); return; }
      const remaining = freezeAt - video.currentTime;

      if (remaining <= slowDuration) {
        // 슬로우 모션 — 선형 감속
        const progress = Math.max(0, 1 - (remaining / slowDuration));
        video.playbackRate = Math.max(0.08, 1 - progress * 0.92);
      }

      if (remaining <= 0.05) {
        video.pause();
        video.currentTime = freezeAt;
        video.playbackRate = 1.0;
        resolve();
        return;
      }
      requestAnimationFrame(monitor);
    };
    requestAnimationFrame(monitor);
  });
}

// 영상 끝까지 그냥 재생
function playToEnd(video) {
  return new Promise(async (resolve) => {
    video.playbackRate = 1.0;
    try { await video.play(); } catch(e) { video.muted = true; await video.play(); }
    video.addEventListener('ended', () => resolve(), { once: true });
  });
}

// 오버레이 UI (메인 스크린에서의 선택지 표시)
// ════════════════════════════════════════════════════════════
const overlay = document.getElementById('overlay');
const overlayContent = document.getElementById('overlayContent');
let currentInputs = {};
let overlayTimerId = null;
let currentOverlayState = null;

// 스토리 분기용 — 각 선택 씬의 결과(winner)를 기록 → 이후 branch 씬에서 참조
// 예: choicesHistory['s06_1_decision'] = '구하러 간다'
let choicesHistory = {};

function showOverlay(scene_id, overlayDef) {
  currentOverlayState = { scene_id, overlay: overlayDef, started_at: Date.now() };
  prevQteTotal = 0;  // 새 씬 시작 시 펄스 추적값 초기화

}

function hideOverlay() {

}

function renderOverlay(options, tally, overlayDef, showWinner = false) {
  // 탭핑 연타는 옵션 막대가 아니라 카운터 + 떠다니는 닉네임으로 표시

  // manual: 진행자가 직접 "다음 진행" 버튼 눌러서 진행
  if (overlayDef.type === 'manual') {
    overlayContent.innerHTML = `

      <div class="ma-manual-wrap">
        <button class="ma-manual-btn" id="manualAdvanceBtn">${escapeHtml(overlayDef.advance_label || '✓ 다음 진행')}</button>
        <div class="ma-manual-note">버튼을 누르면 영상이 이어서 재생됩니다</div>
      </div>
    `;
    document.getElementById('manualAdvanceBtn').onclick = () => {
      // stopOverlayTimer() 를 부르면 waitForOverlayTimer() 가 즉시 풀림
      stopOverlayTimer();
    };
    return;
  }

  // map_align / match3: 청중 폰에서 진행 — 메인 화면은 선착순 슬롯 표시
  if (overlayDef.type === 'map_align' || overlayDef.type === 'match3') {
    const isMatch3 = overlayDef.type === 'match3';
    const successKey = isMatch3 ? 'eliminated' : 'aligned';
    const missionEmoji = isMatch3 ? '🔍' : '🗺️';
    const needed = overlayDef.winners_needed ?? 3;
    // 성공자만 골라서 took_ms 순으로 정렬 (없으면 timestamp 폴백)
    const winners = Object.values(currentInputs)
      .filter(i => i?.input?.[successKey])
      .sort((a, b) => {
        const at = a.input?.took_ms ?? a.timestamp ?? 0;
        const bt = b.input?.took_ms ?? b.timestamp ?? 0;
        return at - bt;
      })
      .slice(0, needed);
    const winnerCount = winners.length;
    const allDone = winnerCount >= needed;

    const rankEmoji = ['🥇','🥈','🥉','4','5','6','7','8','9'];
    const slotsHtml = Array.from({ length: needed }, (_, idx) => {
      const w = winners[idx];
      const rank = rankEmoji[idx] || `${idx + 1}`;
      if (w) {
        const secs = (w.input?.took_ms != null) ? (w.input.took_ms / 1000).toFixed(1) + 's' : '';
        return `
          <div class="ma-slot ma-slot-filled">
            <div class="ma-slot-rank">${rank}</div>
            <div class="ma-slot-name">${escapeHtml(w.nickname || '익명')}</div>
            <div class="ma-slot-time">${secs}</div>
          </div>`;
      }
      return `
        <div class="ma-slot ma-slot-empty">

          <div class="ma-slot-name">대기 중…</div>

    }).join('');

    const statusText = (showWinner || allDone)
      ? `🏆 미션 완료 · 선착순 ${needed}명`
      : `${missionEmoji} 진행 중 · ${winnerCount} / ${needed}명 완성`;

    overlayContent.innerHTML = `

        }

          opacity: 0.4;
        }

        .ma-slot-filled {
          border-color: var(--accent);
          background: linear-gradient(180deg, rgba(255,214,10,0.12), rgba(255,214,10,0.04));

function fitLabelsToWidth() {
  const labels = overlayContent.querySelectorAll('.res-label');
  labels.forEach(el => {

    requestAnimationFrame(() => {
      while (el.scrollWidth > el.clientWidth && size > 14) {

        el.style.fontSize = size + 'px';

    });

}

// ── QTE BURST 전용 렌더 ──────────────────────────────────────
// tally: { nickname: count }
// 중앙에 큰 배터리 박스(현재 탭 수, 차오르는 fill), 양옆에 탭 많이 친 닉네임
// 매 입력마다 전체를 다시 그리지 않고 셸을 한 번만 빌드 → 카운터/이름만 직접 DOM 업데이트
let prevQteTotal = 0;
let qteShellSceneId = null;   // 현재 셸이 어느 씬용인지 추적

function renderQteBurst(tally, overlayDef, showWinner) {
  ensureQteBurstShell(overlayDef);
  updateQteBattery(tally, overlayDef);
  updateQteNames(tally);
}

function ensureQteBurstShell(overlayDef) {
  // 이미 동일 씬의 셸이 있으면 재사용 (실시간 업데이트 빠르게 하려고)
  const sceneKey = currentOverlayState?.scene_id || 'qte_burst';
  if (qteShellSceneId === sceneKey && document.getElementById('qteBattery')) return;
  qteShellSceneId = sceneKey;

  const goal = overlayDef.tap_target_total || 30;
  overlayContent.innerHTML = `
    <div class="qte-names" id="qteNames"></div>
    <div class="status-pill" id="qteStatus">투표 진행 중 · 0명 참여</div>
    <div class="overlay-prompt">${escapeHtml(overlayDef.prompt || '')}</div>
    <div class="overlay-timer" id="overlayTimer">--s</div>
    <div class="qte-battery" id="qteBattery">
      <div class="qte-battery-fill" id="qteFill"></div>
      <div class="qte-battery-num" id="qteNum">0</div>
    </div>
    <div class="qte-goal-label">목표 ${goal}</div>
  `;
  prevQteTotal = 0;
}

function updateQteBattery(tally, overlayDef) {
  const total = Object.values(tally).reduce((a, b) => a + (b || 0), 0);
  const goal = overlayDef.tap_target_total || 30;
  const pct = Math.min(100, (total / goal) * 100);
  const done = total >= goal;

  const num = document.getElementById('qteNum');
  const fill = document.getElementById('qteFill');
  const battery = document.getElementById('qteBattery');
  const status = document.getElementById('qteStatus');
  if (!num || !fill || !battery) return;

  num.textContent = total;
  fill.style.height = pct + '%';
  battery.classList.toggle('done', done);

  if (status) {
    const n = Object.entries(tally).filter(([, c]) => c > 0).length;
    status.textContent = `투표 진행 중 · ${n}명 참여`;
  }

  // 값이 늘 때마다 짧은 펄스 (animation restart)
  if (total > prevQteTotal) {
    num.classList.remove('bump');
    // 강제 reflow 후 다시 추가해야 animation 이 재시작됨
    // eslint-disable-next-line no-unused-expressions
    void num.offsetWidth;
    num.classList.add('bump');
    setTimeout(() => num.classList.remove('bump'), 90);
  }
  prevQteTotal = total;
}

function updateQteNames(tally) {
  const container = document.getElementById('qteNames');
  if (!container) return;

  const tappers = Object.entries(tally)
    .filter(([, c]) => c > 0)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 14);
  const maxCount = tappers[0]?.[1] || 1;

  container.innerHTML = tappers.map(([name, count]) => {
    const seed = strHash(name);
    const sideRand = (seed % 1000) / 1000;
    const xRand    = ((seed >> 3) % 1000) / 1000;
    const yRand    = ((seed >> 7) % 1000) / 1000;
    const rotRand  = ((seed >> 11) % 1000) / 1000;

    const side = sideRand < 0.5 ? 'left' : 'right';
    const x = side === 'left' ? (2 + xRand * 24) : (74 + xRand * 24);
    const y = 8 + yRand * 80;
    const rot = -8 + rotRand * 16;

    const sizeFactor = Math.sqrt(count / maxCount);
    const fontSize = 16 + 14 * sizeFactor;

    return `<div class="qte-name" style="left:${x}%; top:${y}%; font-size:${fontSize}px; transform: rotate(${rot}deg)">
      ${escapeHtml(name)}<span class="cnt">${count}</span>
    </div>`;
  }).join('');
}

// 닉네임 → 정수 해시 (위치 결정용)
function strHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h * 31) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// 7-3 qte_burst 의 최종 탭 통계 — 크레딧 씬에서 사용 ({ nickname: count })
let qteBurstFinalStats = null;

// result_mode === 'success_fail' 일 때 outcome 산출
//   - qte_burst: 누적 탭 수 >= success_threshold
//   - choice/qte/ox/text: 응답한 사람 수 >= success_threshold (기본 1)
function computeSuccessFail(overlayDef, tally, rawInputs) {
  const threshold = overlayDef.success_threshold ?? 1;
  let metric;
  if (overlayDef.type === 'qte_burst') {
    metric = Object.values(tally).reduce((a, b) => a + (b || 0), 0);
  } else {
    metric = Object.keys(rawInputs || {}).length;
  }
  return metric >= threshold ? 'success' : 'fail';
}

// 큰 SUCCESS / FAIL 패널 — result_mode === 'success_fail' 의 reveal 단계 렌더
function renderSuccessFail(outcome, overlayDef, tally) {
  const isSuccess = outcome === 'success';
  const text = isSuccess
    ? (overlayDef.success_text || '✅ SUCCESS')
    : (overlayDef.fail_text || '❌ FAIL');

  // qte_burst 인 경우 누적 탭 카운트도 같이 보여줌
  let subText = '';
  if (overlayDef.type === 'qte_burst') {
    const total = Object.values(tally).reduce((a, b) => a + (b || 0), 0);
    const goal = overlayDef.tap_target_total || overlayDef.success_threshold || 0;
    subText = `<div class="success-fail-sub">${total}<span class="goal"> / ${goal}</span></div>`;
  }

  overlayContent.innerHTML = `
    <div class="success-fail-panel ${isSuccess ? 'success-color' : 'fail-color'}">
      ${escapeHtml(text)}
    </div>
    ${subText}
  `;
}

// 외부에서 깎거나 즉시 종료할 수 있도록 모듈 변수로 보관
let overlayTimerStartedAt = 0;
let overlayTimerDurationMs = 0;
let overlayTimerResolvers = [];

function startOverlayTimer(durationMs) {
  stopOverlayTimer();
  overlayTimerStartedAt = Date.now();
  overlayTimerDurationMs = durationMs;
  const tick = () => {
    if (!currentOverlayState) return;
    const remaining = Math.max(0, overlayTimerDurationMs - (Date.now() - overlayTimerStartedAt));
    const el = document.getElementById('overlayTimer');
    if (el) {
      el.textContent = (remaining/1000).toFixed(1) + 's';
      if (remaining < 3000) el.classList.add('warning');
      else el.classList.remove('warning');
    }
    if (remaining > 0) {
      overlayTimerId = requestAnimationFrame(tick);
    } else {
      // 0 도달 → waitForOverlayTimer() 대기자들 깨우기
      const resolvers = overlayTimerResolvers;
      overlayTimerResolvers = [];
      resolvers.forEach(r => r());
    }
  };
  overlayTimerId = requestAnimationFrame(tick);
}

// 오버레이 타이머가 0 이 될 때까지 대기 (sleep 대체용)
function waitForOverlayTimer() {
  const remaining = overlayTimerDurationMs - (Date.now() - overlayTimerStartedAt);
  if (remaining <= 0) return Promise.resolve();
  return new Promise(resolve => overlayTimerResolvers.push(resolve));
}

// 외부 호출용: 남은 시간 ms 만큼 깎기 (음수가 되면 다음 tick 에서 종료)
function shaveOverlayTimer(ms) {
  if (!overlayTimerStartedAt) return;
  overlayTimerDurationMs = Math.max(0, overlayTimerDurationMs - ms);
}
function stopOverlayTimer() {
  if (overlayTimerId) { cancelAnimationFrame(overlayTimerId); overlayTimerId = null; }
  overlayTimerStartedAt = 0;
  overlayTimerDurationMs = 0;
  // 남아있는 대기자가 있으면 깨워서 풀어줌 (씬 강제 종료 시 안전장치)
  if (overlayTimerResolvers.length) {
    const rs = overlayTimerResolvers;
    overlayTimerResolvers = [];
    rs.forEach(r => r());
  }
}

async function playScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) {
    console.error('Unknown scene:', sceneId);
    return;
  }
  console.log('▶ Scene:', sceneId, scene);

  if (scene.type === 'video') {
    await runVideoScene(sceneId, scene);
  } else if (scene.type === 'ending') {
    await runEndingScene(scene);
  } else if (scene.type === 'credits') {
    await runCreditsScene(scene);
  } else if (scene.type === 'gameover') {
    await runGameOverScene(scene);
  } else if (scene.type === 'choice_only') {
    await runChoiceOnlyScene(sceneId, scene);
  } else if (scene.type === 'branch') {
    await runBranchScene(sceneId, scene);
  } else if (scene.type === 'chapter_title') {
    await runChapterTitleScene(sceneId, scene);
  }
}

// ────────────────────────────────────────────────────────────
// 사용 예:
//   's08_3_branch': {
//     type: 'branch',
//     if_choice_from: 's06_1_decision',
//     next: {
//       '구하러 간다':         's08_3a',
//       '모른 척 한다':         's08_3a',
//       '조력자에게 도움 요청': 's08_3b',
//       default:               's08_3a'
//     }
//   }

async function runBranchScene(sceneId, scene) {
  const sourceSceneId = scene.if_choice_from;
  const recorded = sourceSceneId ? choicesHistory[sourceSceneId] : null;
  console.log('  Branch from', sourceSceneId, '→', recorded);

  // 매핑에 직접 일치 → 그 씬으로
  // 일치 안 함 또는 미기록 → default 로 폴백
  const nextId = (recorded && scene.next[recorded]) || scene.next.default;
  if (nextId) return playScene(nextId);
}

async function runChoiceOnlyScene(sceneId, scene) {
  hideEnding();
  // 검은 화면 유지 (직전 영상의 마지막 프레임이 남아있어도 그대로 OK)

  // 게임 인트로 (overlay.pre_intro 있으면 시작 버튼까지 대기)
  await runPregameIntro(sceneId, scene.overlay);

  const fbScene = {
    scene_id: `${sceneId}_${Date.now()}`,
    type: scene.overlay.type || 'choice',
    started_at: Date.now(),
    duration: scene.overlay.duration || 10000,
    payload: buildOverlayPayload(scene.overlay),
    phase: 'collecting',
    updated_at: Date.now()
  };
  await set(stateRef, fbScene);
  subscribeToInputs(fbScene.scene_id, scene.overlay);
  showOverlay(fbScene.scene_id, scene.overlay);

  await waitForOverlayTimer();

  const winner = pickWinner(scene.overlay.type, currentInputs, scene.overlay, scene.next);
  console.log('  Winner:', winner);
  choicesHistory[sceneId] = winner;

  await update(stateRef, { phase: 'reveal', updated_at: Date.now() });
  renderOverlay(
    scene.overlay.options || ['O','X'],
    aggregateInputs(scene.overlay.type, currentInputs),
    scene.overlay,
    true
  );
  await sleep(3000);

  hideOverlay();
  if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });

  const nextId = scene.next[winner] || scene.next.default;
  if (nextId) return playScene(nextId);
}

async function runVideoScene(sceneId, scene) {
  // 1) 영상 로드
  await loadIntoStandby(scene.src);
  swapVideos();
  hideOverlay();
  hideEnding();

  // 새 영상 시작 시 진행자 일시정지 상태 초기화 + 버튼 라벨 복구
  presenterPaused = false;
  const pbtn = document.getElementById('pauseBtn');
  if (pbtn) pbtn.textContent = '⏸ 일시정지';

  // 2) freeze 지점 계산 — duration 알려면 metadata 필요
  await waitForDuration(activeVideo);
  const totalDuration = activeVideo.duration || 0;

  let freezeAt = null;
  if (scene.freeze_at !== undefined) {
    freezeAt = scene.freeze_at;
  } else if (scene.freeze_before_end !== undefined) {
    freezeAt = totalDuration - scene.freeze_before_end;
  }

  // 3) 재생
  if (freezeAt !== null && scene.overlay) {
    const slow = scene.slow_duration ?? 2.0;
    await playUntilFreeze(activeVideo, freezeAt, slow);

    // 3-b) 게임 인트로 (overlay.pre_intro 있으면 시작 버튼까지 대기 — 영상은 freeze 상태로 정지)
    await runPregameIntro(sceneId, scene.overlay);

    // 4) Firebase 에 씬 상태 쓰기 → 청중 폰 알림
    const fbScene = {
      scene_id: `${sceneId}_${Date.now()}`,
      type: scene.overlay.type,
      started_at: Date.now(),
      duration: scene.overlay.duration || 10000,
      payload: buildOverlayPayload(scene.overlay),
      phase: 'collecting',
      updated_at: Date.now()
    };
    await set(stateRef, fbScene);

    // 5) inputs 구독 시작 + 오버레이 표시
    subscribeToInputs(fbScene.scene_id, scene.overlay);
    showOverlay(fbScene.scene_id, scene.overlay);

    // 6) 투표 시간 동안 대기 (진행자가 ⏹ 버튼이나 −Ns 로 단축 가능)
    await waitForOverlayTimer();

    // 6-b) manual 타입은 청중 투표가 아니라 진행자 버튼 클릭 — reveal 없이 바로 다음 진행
    if (scene.overlay.type === 'manual') {
      console.log('  Manual advance');
      choicesHistory[sceneId] = 'default';
      hideOverlay();
      if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
      await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
      // 영상 이어 재생
      if (scene.resume_after_overlay) {
        await playToEnd(activeVideo);
      }
      const nextManualId = (typeof scene.next === 'string')
        ? scene.next
        : (scene.next.default || Object.values(scene.next || {})[0]);
      if (nextManualId) return playScene(nextManualId);
      return;
    }

    // 7) 결과 계산 — result_mode 가 'success_fail' 이면 성공/실패 판정, 아니면 기존 winner 로직
    const finalTally = aggregateInputs(scene.overlay.type, currentInputs);
    let outcome;
    if (scene.overlay.result_mode === 'success_fail') {
      outcome = computeSuccessFail(scene.overlay, finalTally, currentInputs);
    } else {
      outcome = pickWinner(scene.overlay.type, currentInputs, scene.overlay, scene.next);
    }
    console.log('  Outcome:', outcome);
    choicesHistory[sceneId] = outcome;

    // 7-b) qte_burst 의 최종 통계를 크레딧 씬에서 쓰도록 보관
    if (scene.overlay.type === 'qte_burst') {
      qteBurstFinalStats = finalTally;
    }

    // 8) reveal 단계
    await update(stateRef, { phase: 'reveal', updated_at: Date.now() });
    if (scene.overlay.result_mode === 'success_fail') {
      renderSuccessFail(outcome, scene.overlay, finalTally);
    } else {
      renderOverlay(scene.overlay.options || ['O','X'], finalTally, scene.overlay, true);
    }

    // 9) 결과 음미 시간
    await sleep(3000);

    // 10) 청중 폰 대기 상태로
    hideOverlay();
    if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
    await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });

    // 10-b) 멈춰있던 영상 끝까지 재생 (resume_after_overlay) — 실패 시엔 스킵
    if (scene.resume_after_overlay && outcome !== 'fail') {
      await playToEnd(activeVideo);
    }

    // 11) 분기
    const nextId = scene.next[outcome] || scene.next.default;
    if (nextId) return playScene(nextId);
  } else {
    // freeze 없는 단순 재생
    await playToEnd(activeVideo);
    if (scene.next) {
      const nextId = typeof scene.next === 'string' ? scene.next : scene.next.default;
      if (nextId) return playScene(nextId);
    }
  }
}

async function runEndingScene(scene) {
  hideOverlay();
  // 결말 영상이 있으면 재생
  if (scene.src) {
    await loadIntoStandby(scene.src);
    swapVideos();
    await playToEnd(activeVideo);
  }
  showEnding(scene);
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
}

// ════════════════════════════════════════════════════════════
// GAME OVER 씬 — 실패 시 잠깐 표시 후 지정한 씬으로 재시도
// ════════════════════════════════════════════════════════════
async function runGameOverScene(scene) {
  hideOverlay();
  hideEnding();
  vA.pause(); vB.pause();
  vA.classList.remove('active');
  vB.classList.remove('active');

  const screen = document.getElementById('gameOverScreen');
  document.getElementById('gameOverSub').textContent = scene.sub || '';
  screen.classList.add('show');
  await set(stateRef, { scene_id: '', type: 'gameover', phase: 'idle', updated_at: Date.now() });

  await sleep(scene.duration || 3500);
  screen.classList.remove('show');

  if (scene.next) {
    const nextId = typeof scene.next === 'string' ? scene.next : scene.next.default;
    if (nextId) return playScene(nextId);
  }
}

// ════════════════════════════════════════════════════════════
// 엔딩 크레딧 — 영화 엔딩처럼 아래에서 위로 스크롤
// ════════════════════════════════════════════════════════════
async function runCreditsScene(scene) {
  hideOverlay();
  hideEnding();
  // 검은 배경만 남기고 영상은 정지 (마지막 프레임 안 남게)
  vA.pause(); vB.pause();
  vA.classList.remove('active');
  vB.classList.remove('active');

  const screen = document.getElementById('creditsScreen');
  const restartBtn = document.getElementById('creditsRestartBtn');

  screen.innerHTML = `<div class="credits-roll" id="creditsRoll">${buildCreditsHtml(scene)}</div>`;
  const roll = document.getElementById('creditsRoll');
  const durationMs = scene.duration || 70000;
  roll.style.animationDuration = `${durationMs}ms`;
  screen.classList.add('show');

  // 스크롤 완료 시 다시 시작 버튼 노출
  roll.addEventListener('animationend', () => {
    restartBtn.classList.add('show');
  }, { once: true });

  await set(stateRef, { scene_id: '', type: 'credits', phase: 'idle', updated_at: Date.now() });
}

function hideCredits() {
  const screen = document.getElementById('creditsScreen');
  const restartBtn = document.getElementById('creditsRestartBtn');
  if (screen) {
    screen.classList.remove('show');
    screen.innerHTML = '';
  }
  if (restartBtn) restartBtn.classList.remove('show');
}

function buildCreditsHtml(scene) {
  // 실시간 참가자 닉네임 — currentUsers 가 { userId: { nickname, ... } } 가정
  const usersArr = Object.values(currentUsers || {});
  const nicknames = usersArr
    .map(u => (u && (u.nickname || u.name)) || '')
    .filter(Boolean);

  // 7-3 탭 통계 (있으면)
  let topTappers = [];
  let tapTotal = 0;
  if (qteBurstFinalStats) {
    const entries = Object.entries(qteBurstFinalStats).filter(([, c]) => c > 0);
    topTappers = entries.sort((a, b) => b[1] - a[1]).slice(0, 5);
    tapTotal = entries.reduce((sum, [, c]) => sum + (c || 0), 0);
  }

  const castHtml = nicknames.length
    ? nicknames.map(n => `<div class="row">${escapeHtml(n)}</div>`).join('')
    : `<div class="row" style="color:var(--muted)">참가자 정보 없음</div>`;

  const tapStatsHtml = topTappers.length ? `
    <section>
      <h3>Tapping MVP</h3>
      ${topTappers.map(([name, count]) => `
        <div class="row">${escapeHtml(name)}<span class="cnt">${count}</span></div>
      `).join('')}
    </section>
    <section>
      <h3>Total Clicks</h3>
      <div class="big-stat">${tapTotal.toLocaleString()}</div>
    </section>
  ` : '';

  const producers = scene.producers || [];
  const producersHtml = producers.map(p => `<div class="row">${escapeHtml(p)}</div>`).join('');

  // 수강생/교수님 메시지 — 이름 + 후기 문장 (교수님은 색 다르게)
  const messages = scene.messages || [];
  const messagesHtml = messages.map(m => {
    const isTeacher = (m.name || '').includes('교수');
    return `
      <div class="message ${isTeacher ? 'message-teacher' : ''}">
        <div class="name">${escapeHtml(m.name || '')}</div>
        <div class="text">${escapeHtml(m.text || '')}</div>
      </div>`;
  }).join('');
  const messagesSection = messages.length ? `
    <section>
      <h3>From The Class</h3>
      ${messagesHtml}
    </section>` : '';

  return `
    <h1>${escapeHtml(scene.title || '🎬 The End')}</h1>
    <div class="subtitle">${escapeHtml(scene.subtitle || '')}</div>

    <section>
      <h3>Cast</h3>
      ${castHtml}
    </section>

    ${tapStatsHtml}

    <section>
      <h3>Produced By</h3>
      ${producersHtml}
    </section>

    <section>
      <h3>Supervised By</h3>
      <div class="row">${escapeHtml(scene.supervisor || '')}</div>
    </section>

    ${messagesSection}

    <section>
      <h3>${escapeHtml(scene.course || '')}</h3>
      <div class="closing">${escapeHtml(scene.closing || '')}</div>
    </section>
  `;
}

function waitForDuration(video) {
  return new Promise(resolve => {
    if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) return resolve();
    video.addEventListener('loadedmetadata', () => resolve(), { once: true });
    setTimeout(resolve, 3000);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Firebase 는 undefined 키를 거부하므로 정의된 필드만 골라서 페이로드 구성
function buildOverlayPayload(overlay) {
  const p = { prompt: overlay.prompt || '' };
  if (overlay.options) {
    p.options = overlay.options;
  } else if (overlay.type === 'ox') {
    p.options = ['O', 'X'];
  }
  if (overlay.tap_target_per_user !== undefined) p.tap_target_per_user = overlay.tap_target_per_user;
  if (overlay.tap_target_total !== undefined) p.tap_target_total = overlay.tap_target_total;
  // map_align 전용 필드 전달 — 청중 폰 audience.html 에서 사용
  if (overlay.type === 'map_align') {
    p.map_src        = overlay.map_src        || 'map.png';
    p.omap_src       = overlay.omap_src       || 'omap.png';
    p.target_x_pct   = overlay.target_x_pct   ?? 50;
    p.target_y_pct   = overlay.target_y_pct   ?? 50;
    p.tolerance_pct  = overlay.tolerance_pct  ?? 4;
    p.start_dx_pct   = overlay.start_dx_pct   ?? 22;
    p.start_dy_pct   = overlay.start_dy_pct   ?? -14;
    p.winners_needed = overlay.winners_needed ?? 3;
  }
  // manual 전용 — 청중에게는 안내 문구만, 진행자가 메인에서 수동 진행
  if (overlay.type === 'manual') {
    p.advance_label = overlay.advance_label || '✓ 다음 진행';
  }
  // match3 전용 필드 전달 — 청중 폰에서 게임 구동
  if (overlay.type === 'match3') {
    p.dangers        = overlay.dangers        || ['🔫', '🔪', '🏏'];
    p.safes          = overlay.safes          || ['🍎', '🍋', '🍇', '🍓', '🌸'];
    p.rows           = overlay.rows           || 7;
    p.cols           = overlay.cols           || 6;
    p.winners_needed = overlay.winners_needed ?? 3;
  }
  return p;
}

// ════════════════════════════════════════════════════════════
// inputs 구독 & 집계
// ════════════════════════════════════════════════════════════
function subscribeToInputs(scene_id, overlayDef) {
  currentInputs = {};
  if (inputsUnsubscribe) inputsUnsubscribe();
  inputsUnsubscribe = onValue(ref(db, `inputs/${scene_id}`), (snap) => {
    currentInputs = snap.val() || {};
    if (currentOverlayState?.scene_id === scene_id) {
      const tally = aggregateInputs(overlayDef.type, currentInputs);
      const opts = overlayDef.options || (overlayDef.type === 'ox' ? ['O','X'] : []);
      renderOverlay(opts, tally, overlayDef, false);
    }
    // map_align / match3: 선착순 N명 완성 시 타이머 즉시 종료 → 다음 단계로
    if (overlayDef.type === 'map_align' || overlayDef.type === 'match3') {
      const needed = overlayDef.winners_needed ?? 3;
      const successKey = overlayDef.type === 'map_align' ? 'aligned' : 'eliminated';
      const successCount = Object.values(currentInputs).filter(i => i?.input?.[successKey]).length;
      if (successCount >= needed && overlayTimerDurationMs > 0) {
        console.log(`  ${overlayDef.type}: ${successCount}/${needed} 완성 → 조기 종료`);
        stopOverlayTimer();
      }
    }
  });
}

function aggregateInputs(type, inputs) {
  const t = {};
  for (const userId in inputs) {
    const i = inputs[userId];
    if (!i) continue;
    if (type === 'choice' || type === 'ox') {
      const k = i.input?.choice;
      if (k) t[k] = (t[k] || 0) + 1;
    } else if (type === 'qte_burst') {
      t[i.nickname] = i.input?.count || 0;
    } else if (type === 'text') {
      const w = (i.input?.text || '').trim();
      if (w) t[w] = (t[w] || 0) + 1;
    }
  }
  return t;
}

function pickWinner(type, inputs, overlayDef, nextMap) {
  if (type === 'choice' || type === 'ox') {
    const tally = aggregateInputs(type, inputs);
    const sorted = Object.entries(tally).sort((a,b) => b[1] - a[1]);
    return sorted[0]?.[0] || 'default';
  }
  if (type === 'qte') {
    const reacted = Object.keys(inputs).length;
    // threshold: 청중의 X 비율 이상 반응 시 success
    const threshold = overlayDef.threshold ?? 0.5;
    const total = Object.keys(currentUsers).length || 1;
    return (reacted / total >= threshold) ? 'success' : 'fail';
  }
  return 'default';
}

// ════════════════════════════════════════════════════════════
// 참가자 & 연결 상태
// ════════════════════════════════════════════════════════════
let currentUsers = {};
onValue(usersRef, (snap) => {
  currentUsers = snap.val() || {};
  const count = Object.keys(currentUsers).length;
  document.getElementById('userCount').textContent = count;
  document.getElementById('hudUsers').textContent = count;
});

onValue(ref(db, '.info/connected'), (snap) => {
  const ok = !!snap.val();
  document.getElementById('connDot').classList.toggle('live', ok);
  document.getElementById('hudConn').textContent = ok ? 'LIVE' : 'OFFLINE';
  document.getElementById('connText').textContent = ok ? 'LIVE 연결됨' : '연결 중...';
});

// ════════════════════════════════════════════════════════════
// 게임 컨트롤
// ════════════════════════════════════════════════════════════
async function startGame() {
  document.getElementById('startScreen').classList.add('hide');
  document.getElementById('devControls').classList.add('active');
  // 청중 입력 초기화
  await remove(ref(db, 'inputs'));
  // 시작 씬 재생
  playScene(START_SCENE);
}

window.restartGame = async function() {
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('devControls').classList.remove('active');
  document.getElementById('gameOverScreen').classList.remove('show');
  hideEnding();
  hideOverlay();
  hideCredits();
  qteBurstFinalStats = null;
  vA.pause(); vB.pause();
  vA.src = ''; vB.src = '';
  vA.classList.remove('active');
  vB.classList.remove('active');
  if (inputsUnsubscribe) { inputsUnsubscribe(); inputsUnsubscribe = null; }
  await remove(ref(db, 'inputs'));
  await set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
  document.getElementById('startScreen').classList.remove('hide');
};

document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = window.restartGame;
document.getElementById('creditsRestartBtn').onclick = window.restartGame;

// ────────────────────────────────────────────────
// 진행자 컨트롤 와이어업
// ────────────────────────────────────────────────
document.getElementById('skipVideoBtn').onclick = () => {
  // 현재 active 영상의 currentTime 을 끝으로 점프
  //   - playUntilFreeze 의 RAF 모니터가 freezeAt 으로 catch 해서 pause + resolve
  //   - playToEnd 는 'ended' 이벤트 발화로 resolve
  if (!activeVideo) return;
  const dur = activeVideo.duration;
  if (dur && isFinite(dur)) {
    try { activeVideo.currentTime = Math.max(0, dur - 0.1); } catch(e) { console.warn('skip failed', e); }
  }
};

// 일시정지 토글 — 진행자가 발표 중 잠깐 멈출 때
//   - 재생 중일 때만 작동, 진행자가 누른 상태에서만 다시 재생 가능
//   - freeze 등 자동 정지 상태일 땐 클릭해도 무시 (실수로 freeze 해제되는 사고 방지)
document.getElementById('pauseBtn').onclick = () => {
  if (!activeVideo) return;
  const btn = document.getElementById('pauseBtn');
  if (presenterPaused) {
    // 진행자가 멈췄던 상태 → 재생 재개
    activeVideo.play().catch(err => console.warn('play failed', err));
    presenterPaused = false;
    btn.textContent = '⏸ 일시정지';
  } else if (!activeVideo.paused) {
    // 재생 중 → 진행자가 일시정지
    activeVideo.pause();
    presenterPaused = true;
    btn.textContent = '▶ 재생';
  }
  // else: 자동 정지 (freeze / 씬 전환) 중 — 클릭 무시
};

document.getElementById('shave5Btn').onclick = () => shaveOverlayTimer(5000);
document.getElementById('endVoteBtn').onclick = () => shaveOverlayTimer(99999999);

// ════════════════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════════════════
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// 초기화: idle 상태로 셋
set(stateRef, { scene_id: '', type: 'idle', phase: 'idle', updated_at: Date.now() });
</script>
